# ================================================================
# 宝塔面板 → 网站 → 你的站点 → 设置 → 配置 → Nginx配置
# 把以下内容粘贴到 existing server {} 块内，替换或追加
# ================================================================

# 静态资源直接返回，不经过 PHP（加速）
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map|html)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# router.php 统一入口（所有请求先到这里路由）
location / {
    try_files $uri $uri/ /pro/router.php?$query_string;
}

# 直接访问 .php 文件（兼容 api.php、admin.php 等旧入口）
location ~ \.php$ {
    try_files $uri =404;
    fastcgi_pass unix:/tmp/php-cgi-8.2.sock;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}
