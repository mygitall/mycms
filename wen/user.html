<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>个人中心 · 文轩</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    // 禁止双指缩放页面（兼容 iOS、Android、鸿蒙等所有移动端浏览器）
    document.addEventListener('touchstart', function (e) {
      if (e.touches.length > 1) {
        e.preventDefault();
      }
    }, { passive: false });

    var lastTouchEnd = 0;
    document.addEventListener('touchend', function (e) {
      var now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('gesturestart', function (e) {
      e.preventDefault();
    });
    document.addEventListener('gesturechange', function (e) {
      e.preventDefault();
    });
    document.addEventListener('gestureend', function (e) {
      e.preventDefault();
    });

    document.addEventListener('keydown', function (e) {
      if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '0')) {
        e.preventDefault();
      }
    });

    document.addEventListener('wheel', function (e) {
      if (e.ctrlKey) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>
</head>
<body>

  <!-- 顶部导航 -->
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">文轩</span>
      </a>
      <div class="header-actions">
        <button class="btn-icon" id="searchBtn" title="搜索">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <div class="user-area" id="userArea">
          <button class="btn-login" id="btnLoginHeader">登录</button>
          <div class="user-avatar" id="userAvatar" style="display:none;">
            <span id="avatarInitial"></span>
            <div class="user-dropdown" id="userDropdown">
              <a href="user.html" class="dropdown-item active" id="toUserCenter">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                个人中心
              </a>
              <button class="dropdown-item" id="btnLogout">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                退出登录
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- 登录墙（未登录时显示） -->
  <div class="login-wall" id="loginWall" style="display:none;">
    <div class="login-wall-inner">
      <div class="login-wall-icon">✦</div>
      <h2>登录后访问个人中心</h2>
      <p>登录文轩，收藏和管理你喜欢的文章</p>
      <button class="btn-submit" id="btnLoginWall">立即登录</button>
    </div>
  </div>

  <!-- 个人中心主体 -->
  <main class="user-center" id="userCenter">
    <div class="user-container">

      <!-- 用户信息卡 -->
      <div class="user-profile-card" id="userProfileCard">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="profileAvatar">U</div>
          <button class="avatar-edit-btn" id="avatarEditBtn" title="更换头像">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
        <div class="profile-info">
          <h2 class="profile-username" id="profileUsername">—</h2>
          <p class="profile-email" id="profileEmail">—</p>
          <p class="profile-bio" id="profileBio">这个人很懒，什么也没留下</p>
        </div>
        <button class="profile-edit-btn" id="profileEditBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          编辑资料
        </button>
      </div>

      <!-- 编辑资料弹窗 -->
      <div class="edit-profile-modal" id="editProfileModal">
        <div class="edit-profile-panel">
          <h3>编辑个人资料</h3>
          <div class="form-item">
            <label>用户名</label>
            <input type="text" id="editUsername" placeholder="2-20位字母、数字、下划线">
          </div>
          <div class="form-item">
            <label>个人简介</label>
            <textarea id="editBio" placeholder="介绍一下自己吧..." maxlength="100"></textarea>
            <span class="char-count"><span id="bioCount">0</span>/100</span>
          </div>
          <div class="form-error" id="editError"></div>
          <div class="modal-btn-row">
            <button class="btn-cancel" id="cancelEdit">取消</button>
            <button class="btn-submit" id="saveEdit">保存</button>
          </div>
        </div>
      </div>

      <!-- 头像选择弹窗 -->
      <div class="avatar-picker-modal" id="avatarPickerModal">
        <div class="avatar-picker-panel">
          <h3>选择头像颜色</h3>
          <div class="avatar-colors" id="avatarColors">
            <div class="avatar-color" data-color="#e74c3c" style="background:#e74c3c"></div>
            <div class="avatar-color" data-color="#e67e22" style="background:#e67e22"></div>
            <div class="avatar-color" data-color="#f1c40f" style="background:#f1c40f"></div>
            <div class="avatar-color" data-color="#2ecc71" style="background:#2ecc71"></div>
            <div class="avatar-color" data-color="#3498db" style="background:#3498db"></div>
            <div class="avatar-color" data-color="#9b59b6" style="background:#9b59b6"></div>
            <div class="avatar-color" data-color="#1abc9c" style="background:#1abc9c"></div>
            <div class="avatar-color" data-color="#e91e63" style="background:#e91e63"></div>
          </div>
          <button class="avatar-picker-close" id="avatarPickerClose">关闭</button>
        </div>
      </div>

      <!-- 数据统计 -->
      <div class="user-stats" id="userStats">
        <div class="stat-item">
          <span class="stat-num" id="statFav">0</span>
          <span class="stat-label">收藏文章</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="statRead">0</span>
          <span class="stat-label">阅读时长</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="statDays">0</span>
          <span class="stat-label">注册天数</span>
        </div>
      </div>

      <!-- Tab 切换 -->
      <div class="user-tabs">
        <button class="user-tab active" data-user-tab="fav">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          我的收藏
        </button>
        <button class="user-tab" data-user-tab="history">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.44"/></svg>
          阅读历史
        </button>
        <button class="user-tab" data-user-tab="settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          账号设置
        </button>
      </div>

      <!-- 我的收藏 -->
      <div class="user-tab-content" id="tabFav">
        <div class="fav-empty" id="favEmpty" style="display:none;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <p>还没有收藏任何文章</p>
          <a href="index.html" class="btn-goto">去发现好文</a>
        </div>
        <div class="article-list" id="favList"></div>
        <div class="fav-remove-hint" id="favRemoveHint" style="display:none;">
          <p>点击文章卡片右上角 <strong>♡</strong> 可取消收藏</p>
        </div>
      </div>

      <!-- 阅读历史 -->
      <div class="user-tab-content" id="tabHistory" style="display:none;">
        <div class="fav-empty" id="historyEmpty" style="display:none;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.44"/></svg>
          <p>还没有阅读记录</p>
          <a href="index.html" class="btn-goto">开始阅读</a>
        </div>
        <div class="article-list" id="historyList"></div>
      </div>

      <!-- 账号设置 -->
      <div class="user-tab-content" id="tabSettings" style="display:none;">
        <div class="settings-section">
          <h4>修改密码</h4>
          <div class="form-item">
            <label>当前密码</label>
            <input type="password" id="curPwd" placeholder="请输入当前密码" autocomplete="current-password">
          </div>
          <div class="form-item">
            <label>新密码</label>
            <input type="password" id="newPwd" placeholder="至少6位" autocomplete="new-password">
          </div>
          <div class="form-item">
            <label>确认新密码</label>
            <input type="password" id="newPwd2" placeholder="再次输入新密码" autocomplete="new-password">
          </div>
          <div class="form-error" id="pwdError"></div>
          <button class="btn-submit" id="btnChangePwd">确认修改</button>
        </div>
        <div class="settings-section danger-zone">
          <h4>危险操作</h4>
          <p>注销账号后，所有数据将被永久删除且无法恢复。</p>
          <button class="btn-danger" id="btnDeleteAccount">注销账号</button>
        </div>
      </div>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"><span id="toastMsg"></span></div>

  <!-- 登录弹窗 -->
  <div class="modal-overlay" id="authModal">
    <div class="auth-modal">
      <button class="modal-close" id="modalClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="auth-form" id="loginForm">
        <div class="auth-header">
          <h2>欢迎回来</h2>
          <p>登录文轩，发现更多精彩</p>
        </div>
        <div class="form-item">
          <label>用户名 / 邮箱</label>
          <input type="text" id="loginUsername" placeholder="请输入用户名或邮箱" autocomplete="username">
        </div>
        <div class="form-item">
          <label>密码</label>
          <div class="password-wrap">
            <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
            <button class="toggle-pwd" type="button">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-error" id="loginError"></div>
        <button class="btn-submit" id="btnLogin">登 录</button>
        <div class="auth-switch">还没有账号？<a href="#" id="toRegister">立即注册</a></div>
      </div>
      <div class="auth-form" id="registerForm" style="display:none;">
        <div class="auth-header">
          <h2>创建账号</h2>
          <p>加入文轩，开启阅读之旅</p>
        </div>
        <div class="form-item">
          <label>用户名</label>
          <input type="text" id="regUsername" placeholder="2-20位字母、数字、下划线" autocomplete="username">
        </div>
        <div class="form-item">
          <label>密码</label>
          <div class="password-wrap">
            <input type="password" id="regPassword" placeholder="至少6位，区分大小写" autocomplete="new-password">
            <button class="toggle-pwd" type="button">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-item">
          <label>确认密码</label>
          <div class="password-wrap">
            <input type="password" id="regPassword2" placeholder="再次输入密码" autocomplete="new-password">
          </div>
        </div>
        <div class="form-error" id="regError"></div>
        <button class="btn-submit" id="btnRegister">注 册</button>
        <div class="auth-switch">已有账号？<a href="#" id="toLogin">立即登录</a></div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
