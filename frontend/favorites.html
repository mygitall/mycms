<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏 - MYCMS</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="logo">MY<span>CMS</span></a>
  <nav>
    <a href="index.html">首页</a>
    <a href="list.html">文章</a>
    <a href="search.html">搜索</a>
    <a href="favorites.html" class="active" id="nav-favorites">收藏</a>
  </nav>
  <div class="user-area" id="user-area">
    <span id="user-info" style="display:none"></span>
    <a href="login.html" class="btn-sm btn-outline" id="btn-login">登录</a>
    <button class="btn-sm btn-outline" id="btn-logout" style="display:none" onclick="doLogout()">退出</button>
  </div>
</header>

<section class="main">
  <h2 style="margin-bottom:16px">我的收藏</h2>

  <!-- 未登录 -->
  <div id="need-login" class="card" style="text-align:center;padding:48px">
    <div style="font-size:48px;margin-bottom:12px">&#128274;</div>
    <p style="color:var(--text-muted);margin-bottom:16px">请先登录后查看收藏</p>
    <a href="login.html?redirect=favorites.html" class="btn-sm btn-primary" style="display:inline-block;padding:10px 24px">去登录</a>
  </div>

  <!-- 统计 -->
  <div class="stats-row" id="stats-row" style="display:none"></div>

  <!-- 收藏列表 -->
  <div class="card" id="fav-card" style="display:none">
    <div class="card-header">
      <span class="card-title">收藏列表</span>
      <span style="font-size:12px;color:var(--text-muted)" id="fav-count"></span>
    </div>
    <div class="article-list" id="fav-list">
      <div class="empty"><p>加载中...</p></div>
    </div>
  </div>

  <!-- 分页 -->
  <div class="pagination" id="pagination" style="display:none"></div>
</section>

<footer class="footer">MYCMS Frontend v1.0.1</footer>

<script src="assets/js/api.js"></script>
<script>
var currentPage = 1, totalPages = 1;

function updateUI() {
  var li = CMS.isLoggedIn();
  document.getElementById('btn-login').style.display = li ? 'none' : '';
  document.getElementById('btn-logout').style.display = li ? '' : 'none';
  if (li && CMS._user) {
    document.getElementById('user-info').style.display = '';
    document.getElementById('user-info').textContent = CMS._user.username;
    document.getElementById('need-login').style.display = 'none';
    document.getElementById('fav-card').style.display = '';
    document.getElementById('stats-row').style.display = '';
    loadFavorites(1);
    loadStats();
  } else {
    document.getElementById('need-login').style.display = '';
    document.getElementById('fav-card').style.display = 'none';
    document.getElementById('stats-row').style.display = 'none';
  }
}

function doLogout() {
  CMS.clearAuth();
  updateUI();
  showToast('已退出');
}

function loadStats() {
  CMS.post(CMS.favoritesStats).then(function(res) {
    if (res.code !== 0) return;
    var s = res.data;
    document.getElementById('stats-row').innerHTML =
      '<div class="stat-card"><div class="num">' + (s.total || 0) + '</div><div class="label">总收藏</div></div>' +
      '<div class="stat-card"><div class="num">' + (s.today_count || 0) + '</div><div class="label">今日新增</div></div>' +
      '<div class="stat-card"><div class="num">' + (s.week_count || 0) + '</div><div class="label">本周新增</div></div>';
  });
}

function loadFavorites(page) {
  currentPage = page || 1;
  document.getElementById('fav-list').innerHTML = '<div class="empty"><p>加载中...</p></div>';

  CMS.fetch(CMS.favorites, {
    method: 'POST',
    body: JSON.stringify({ _token: CMS._token, user_id: CMS._user.user_id, page: currentPage, page_size: 10 })
  }).then(function(res) {
    if (res.code !== 0) { showToast(res.msg, 'error'); return; }
    var d = res.data;
    totalPages = d.total_pages || 1;
    document.getElementById('fav-count').textContent = '共 ' + (d.total || 0) + ' 篇';

    var html = '';
    if (d.list && d.list.length) {
      d.list.forEach(function(item) {
        var title = escapeHtml(item.title || '无标题');
        var content = truncate(item.content, 120);
        var date = formatDate(item.created_at || '');
        var url = CMS.BASE + '/detail?id=' + item.id;
        html += '<div class="item" style="cursor:pointer">' +
          '<div class="thumb">' + title.charAt(0) + '</div>' +
          '<div class="info" onclick="location.href=\'' + url + '\'">' +
            '<h3>' + title + '</h3>' +
            '<p>' + content + '</p>' +
            '<div class="meta"><span>收藏于 ' + date + '</span></div>' +
          '</div>' +
          '<button class="btn-sm btn-outline" style="flex-shrink:0;margin-top:8px" onclick="event.stopPropagation();removeFav(' + item.id + ',this)">取消收藏</button>' +
        '</div>';
      });
    } else {
      html = '<div class="empty"><p>还没有收藏文章</p></div>';
    }
    document.getElementById('fav-list').innerHTML = html;
    renderPagination();
  });
}

function removeFav(articleId, btn) {
  CMS.getCSRF().then(function(csrfRes) {
    return CMS.fetch(CMS.unfavorite, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfRes.data.csrf_token },
      credentials: 'include',
      body: JSON.stringify({ _token: CMS._token, article_id: articleId })
    });
  }).then(function(res) {
    if (res.code === 0) {
      showToast('已取消收藏');
      loadFavorites(currentPage);
      loadStats();
    } else {
      showToast(res.msg, 'error');
    }
  });
}

function renderPagination() {
  if (totalPages <= 1) return;
  document.getElementById('pagination').style.display = '';
  var html = '';
  html += '<button ' + (currentPage <= 1 ? 'disabled' : '') + ' onclick="loadFavorites(' + (currentPage-1) + ')">上一页</button>';
  for (var i = 1; i <= totalPages && i <= 5; i++) {
    html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="loadFavorites(' + i + ')">' + i + '</button>';
  }
  html += '<button ' + (currentPage >= totalPages ? 'disabled' : '') + ' onclick="loadFavorites(' + (currentPage+1) + ')">下一页</button>';
  document.getElementById('pagination').innerHTML = html;
}

updateUI();
</script>
</body>
</html>
