<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情 - MYCMS</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="logo">MY<span>CMS</span></a>
  <nav>
    <a href="index.html">首页</a>
    <a href="list.html">文章</a>
    <a href="search.html">搜索</a>
    <a href="favorites.html" id="nav-favorites" style="display:none">收藏</a>
  </nav>
  <div class="user-area" id="user-area">
    <a href="login.html" class="btn-sm btn-outline" id="btn-login">登录</a>
    <button class="btn-sm btn-outline" id="btn-logout" style="display:none" onclick="doLogout()">退出</button>
  </div>
</header>

<section class="main">
  <!-- 面包屑 -->
  <div style="margin-bottom:16px;font-size:13px;color:var(--text-muted)">
    <a href="index.html">首页</a> &rsaquo; <a href="list.html">文章</a> &rsaquo; <span id="breadcrumb-title">详情</span>
  </div>

  <!-- 文章详情 -->
  <div class="card article-detail" id="detail-card">
    <div class="empty"><p>加载中...</p></div>
  </div>

  <!-- 相关推荐 -->
  <div class="card">
    <div class="card-header"><span class="card-title">相关推荐</span></div>
    <div class="article-grid" id="related-articles">
      <div class="empty"><p>加载中...</p></div>
    </div>
  </div>
</section>

<footer class="footer">MYCMS Frontend v1.0.1</footer>

<script src="assets/js/api.js"></script>
<script>
var articleId = parseInt(getParam('id')) || 0;
var isFavorited = false;

function updateUI() {
  var li = CMS.isLoggedIn();
  document.getElementById('btn-login').style.display = li ? 'none' : '';
  document.getElementById('btn-logout').style.display = li ? '' : 'none';
  document.getElementById('nav-favorites').style.display = li ? '' : 'none';
}

function doLogout() { CMS.clearAuth(); updateUI(); showToast('已退出'); }

function toggleFavorite() {
  if (!CMS.isLoggedIn()) {
    showToast('请先登录', 'error');
    location.href = CMS.BASE + '/login?redirect=' + encodeURIComponent(CMS.BASE + '/detail?id=' + articleId);
    return;
  }
  var api = isFavorited ? CMS.unfavorite : CMS.favorite;
  CMS.getCSRF().then(function(csrfRes) {
    var csrf = csrfRes.data.csrf_token;
    return CMS.fetch(api, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrf },
      credentials: 'include',
      body: JSON.stringify({ _token: CMS._token, article_id: articleId })
    });
  }).then(function(res) {
    if (res.code === 0) {
      isFavorited = !isFavorited;
      updateFavBtn();
      showToast(isFavorited ? '已收藏' : '已取消收藏');
    } else {
      showToast(res.msg, 'error');
    }
  });
}

function updateFavBtn() {
  var btn = document.getElementById('fav-btn');
  if (!btn) return;
  btn.className = 'fav-btn' + (isFavorited ? ' favorited' : '');
  btn.innerHTML = '<span class="heart">' + (isFavorited ? '&#10084;' : '&#9825;') + '</span>' +
    (isFavorited ? '已收藏' : '收藏');
}

if (articleId <= 0) {
  document.getElementById('detail-card').innerHTML = '<div class="empty"><p>缺少文章 ID</p></div>';
} else {
  CMS.post(CMS.articleView, { id: articleId }).then(function(res) {
    if (res.code !== 0) {
      document.getElementById('detail-card').innerHTML = '<div class="empty"><p>' + escapeHtml(res.msg) + '</p></div>';
      return;
    }
    var a = res.data;
    document.title = a.title + ' - MYCMS';
    document.getElementById('breadcrumb-title').textContent = a.title;

    var tagHTML = (a.tags || '').split(',').filter(Boolean).map(function(t) {
      return '<span style="background:var(--bg);padding:2px 8px;border-radius:4px;font-size:11px">' + escapeHtml(t.trim()) + '</span>';
    }).join(' ');

    document.getElementById('detail-card').innerHTML =
      '<h1>' + escapeHtml(a.title) + '</h1>' +
      '<div class="detail-meta">' +
        '<span>作者：' + escapeHtml(a.author_name || '佚名') + '</span>' +
        '<span>分类：' + escapeHtml(a.category || '未分类') + '</span>' +
        '<span>发布于 ' + formatDate(a.published_at || a.created_at) + '</span>' +
        '<span>' + (a.view_count || 0) + ' 次阅读</span>' +
        (tagHTML ? '<span>' + tagHTML + '</span>' : '') +
        '<button id="fav-btn" class="fav-btn" onclick="toggleFavorite()">' +
          '<span class="heart">&#9825;</span> 收藏</button>' +
      '</div>' +
      '<div class="detail-content">' + (a.content || '（无内容）') + '</div>';

    // 检查收藏状态
    if (CMS.isLoggedIn()) {
      CMS.getCSRF().then(function(csrfRes) {
        return CMS.fetch(CMS.favoriteStatus, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfRes.data.csrf_token },
          credentials: 'include',
          body: JSON.stringify({ _token: CMS._token, article_id: articleId })
        });
      }).then(function(favRes) {
        if (favRes.code === 0 && favRes.data[articleId]) {
          isFavorited = true;
          updateFavBtn();
        }
      });
    }

    // 相关推荐（同分类）
    if (a.category) {
      CMS.post(CMS.articleList, { page: 1, page_size: 3, category: a.category, sort_by: 'view_count', sort_order: 'desc' })
        .then(function(r) {
          if (r.code === 0 && r.data.list) {
            var related = r.data.list.filter(function(x) { return x.id !== articleId; }).slice(0, 3);
            var html = related.length ?
              related.map(renderArticleCard).join('') :
              '<div class="empty"><p>暂无相关文章</p></div>';
            document.getElementById('related-articles').innerHTML = html;
          }
        });
    } else {
      document.getElementById('related-articles').innerHTML = '<div class="empty"><p>暂无相关文章</p></div>';
    }
  });
}

updateUI();
</script>
</body>
</html>
