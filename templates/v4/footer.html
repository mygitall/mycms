<!-- ═══════════════ 公共底部 footer.html（含移动端适配）═══════════════ -->
<style>
  .footer{border-top:0.5px solid var(--border);padding:48px 0 32px;margin-top:40px}
  .footer-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap}
  .footer-brand{display:flex;flex-direction:column;gap:8px}
  .footer-logo{font-size:18px;font-weight:650;color:var(--text);text-decoration:none}
  .footer-logo span{color:var(--accent)}
  .footer-tagline{font-size:13px;color:var(--text-3)}
  .footer-links{display:flex;gap:48px;flex-wrap:wrap}
  .footer-col{display:flex;flex-direction:column;gap:10px;min-width:80px}
  .col-title{font-size:11px;font-weight:550;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
  .footer-col a{font-size:13px;color:var(--text-2);text-decoration:none;transition:color .2s}
  .footer-col a:hover{color:var(--text)}
  .footer-bottom{max-width:1280px;margin:32px auto 0;padding:24px 24px 0;border-top:0.5px solid var(--border);text-align:center}
  .footer-bottom p{font-size:12px;color:var(--text-3)}
  .footer-bottom a{color:var(--text-2);text-decoration:none}
  @media (max-width:560px){
    .footer-inner{flex-direction:column;gap:24px;padding:0 16px}
    .footer-links{gap:24px}
    .footer-bottom{padding:20px 16px 0}
  }
</style>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <a href="/" class="footer-logo">Neo<span>Vision</span></a>
      <span class="footer-tagline">[--site_name--] · 科技前沿 · 智能洞察</span>
    </div>
    <div class="footer-links">
      <div class="footer-col">
        <div class="col-title">导航</div>
        <a href="/">首页</a>
        <a href="/article-list">文章列表</a>
        <a href="/software-list">软件列表</a>
        <a href="/tag-doc">标签文档</a>
      </div>
      <div class="footer-col">
        <div class="col-title">栏目</div>
        [--loop:columns(pid=0)--]
        <a href="[--url--]">[--name--]</a>
        [--/loop:columns--]
      </div>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; [--current_year--] [--site_name--]. All rights reserved.</p>
  </div>
</footer>
