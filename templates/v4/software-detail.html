<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>软件详情 - [--site_name--]</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f7; color: #1a1a1f; }
  h1 { font-size: 24px; margin-bottom: 10px; }
  .meta { color: #888; font-size: 14px; margin-bottom: 20px; }
  .desc { line-height: 1.8; font-size: 15px; color: #333; }
  .back { color: #5b6cf0; text-decoration: none; font-size: 14px; }
</style>
</head>
<body>

[--loop:software_detail--]
<h1>[--name--]</h1>
<div class="meta">
  <span>版本: v[--version--]</span> | 
  <span>分类: [--category--]</span> | 
  <span>浏览: [--view_count--]</span> | 
  <span>下载: [--download_count--]</span>
</div>
<div class="desc">[--description--]</div>
<p><a href="[--download_urls--]" target="_blank" style="display:inline-block;padding:8px 20px;background:#5b6cf0;color:#fff;border-radius:6px;text-decoration:none;margin-top:12px">下载</a></p>
[--/loop:software_detail--]

<p><a href="javascript:history.back()" class="back">← 返回</a></p>

</body>
</html>
