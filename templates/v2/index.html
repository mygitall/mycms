<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYCMS - 首页 V2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.6; }
        .topbar { background: #1e293b; border-bottom: 1px solid #334155; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
        .topbar .logo { font-size: 20px; font-weight: 700; color: #38bdf8; }
        .topbar nav a { margin-left: 24px; color: #94a3b8; text-decoration: none; font-size: 14px; }
        .topbar nav a:hover { color: #e2e8f0; }
        .hero { text-align: center; padding: 100px 24px 80px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); position: relative; overflow: hidden; }
        .hero::before { content:''; position: absolute; top:-50%; left:-50%; width:200%; height:200%; background: radial-gradient(circle at 30% 50%, rgba(56,189,248,.08) 0%, transparent 60%); }
        .hero h1 { font-size: 44px; font-weight: 800; margin-bottom: 12px; position: relative; background: linear-gradient(90deg, #38bdf8, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: #94a3b8; font-size: 16px; max-width: 480px; margin: 0 auto 28px; position: relative; }
        .hero .btn { display: inline-block; padding: 11px 30px; background: #38bdf8; color: #0f172a; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; margin: 0 6px; }
        .hero .btn-outline { background: transparent; color: #38bdf8; border: 1px solid #38bdf8; }
        .cards { max-width: 1080px; margin: 48px auto; padding: 0 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: #1e293b; border-radius: 12px; padding: 28px; border: 1px solid #334155; transition: border-color .2s; }
        .card:hover { border-color: #38bdf8; }
        .card .icon { font-size: 28px; margin-bottom: 12px; }
        .card h3 { font-size: 16px; margin-bottom: 8px; color: #f1f5f9; }
        .card p { color: #94a3b8; font-size: 13px; }
        .footer { text-align: center; padding: 32px; color: #475569; font-size: 12px; }
        .badge { position: absolute; top: 12px; right: 12px; background: linear-gradient(135deg, #38bdf8, #a78bfa); color: #0f172a; padding: 2px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; z-index: 20; }
        @media (max-width: 768px) { .cards { grid-template-columns: 1fr; } .hero h1 { font-size: 30px; } }
    </style>
</head>
<body>

<div style="position:relative">
    <span class="badge">V2 暗夜版</span>
    <div class="topbar">
        <div class="logo">MYCMS</div>
        <nav>
            <a href="/">首页</a>
            <a href="/list">文章</a>
            <a href="/search">搜索</a>
            <a href="/favorites">收藏</a>
            <a href="/login">登录</a>
        </nav>
    </div>

    <div class="hero">
        <h1>欢迎来到 MYCMS</h1>
        <p>全新暗夜主题，更现代的设计语言，为您带来沉浸式内容管理体验。</p>
        <a href="/list" class="btn">开始探索</a>
        <a href="/login" class="btn btn-outline">登录系统</a>
    </div>

    <div class="cards">
        <div class="card">
            <div class="icon">📝</div>
            <h3>文章管理</h3>
            <p>富文本编辑、分类管理、多条件筛选，高效创作与发布内容。</p>
        </div>
        <div class="card">
            <div class="icon">📦</div>
            <h3>软件资源</h3>
            <p>软件下载管理，版本追踪，分类筛选，下载量统计一应俱全。</p>
        </div>
        <div class="card">
            <div class="icon">⭐</div>
            <h3>收藏系统</h3>
            <p>个性化收藏管理，支持文章与软件收藏，数据可视化展示。</p>
        </div>
    </div>

    <div class="footer">&copy; 2026 MYCMS. Powered by V2.</div>
</div>

</body>
</html>
