<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYCMS - 首页 V2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.6; }
        .topbar { background: #1e293b; border-bottom: 1px solid #334155; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
        .topbar .logo { font-size: 20px; font-weight: 700; color: #38bdf8; }
        .topbar nav a { margin-left: 24px; color: #94a3b8; text-decoration: none; font-size: 14px; }
        .topbar nav a:hover { color: #e2e8f0; }
        .hero { text-align: center; padding: 100px 24px 80px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); position: relative; overflow: hidden; }
        .hero::before { content:''; position: absolute; top:-50%; left:-50%; width:200%; height:200%; background: radial-gradient(circle at 30% 50%, rgba(56,189,248,.08) 0%, transparent 60%); }
        .hero h1 { font-size: 44px; font-weight: 800; margin-bottom: 12px; position: relative; background: linear-gradient(90deg, #38bdf8, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: #94a3b8; font-size: 16px; max-width: 480px; margin: 0 auto 28px; position: relative; }
        .hero .btn { display: inline-block; padding: 11px 30px; background: #38bdf8; color: #0f172a; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; margin: 0 6px; }
        .hero .btn-outline { background: transparent; color: #38bdf8; border: 1px solid #38bdf8; }
        .section { max-width: 1080px; margin: 0 auto; padding: 0 24px 40px; }
        .section-title { font-size: 20px; font-weight: 700; margin: 48px 0 16px; display: flex; align-items: center; gap: 8px; }
        .section-title .dot { width: 8px; height: 8px; border-radius: 50%; background: #38bdf8; }
        .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; transition: border-color .2s; }
        .card:hover { border-color: #38bdf8; }
        .card .meta { display: flex; gap: 10px; font-size: 11px; color: #64748b; margin-bottom: 6px; flex-wrap: wrap; }
        .card .meta span { background: #334155; padding: 2px 8px; border-radius: 4px; }
        .card .meta .cat { background: rgba(56,189,248,.15); color: #38bdf8; }
        .card .meta .ver { color: #a78bfa; font-weight: 600; }
        .card h3 { font-size: 16px; margin-bottom: 8px; color: #f1f5f9; }
        .card h3 a { color: #f1f5f9; text-decoration: none; }
        .card h3 a:hover { color: #38bdf8; }
        .card p { color: #94a3b8; font-size: 13px; line-height: 1.5; }
        .footer { text-align: center; padding: 32px; color: #475569; font-size: 12px; }
        .badge { position: absolute; top: 12px; right: 12px; background: linear-gradient(135deg, #38bdf8, #a78bfa); color: #0f172a; padding: 2px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; z-index: 20; }
        .empty { text-align: center; padding: 40px; color: #475569; font-size: 14px; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        @media (max-width: 768px) { .cards { grid-template-columns: 1fr; } .hero h1 { font-size: 30px; } }
    </style>
</head>
<body>

<div style="position:relative">
    <span class="badge">V2 暗夜版</span>
    <div class="topbar">
        <div class="logo">MYCMS</div>
        <nav>
            <a href="/">首页</a>
            <a href="/list">文章</a>
            <a href="/search">搜索</a>
            <a href="/favorites">收藏</a>
            <a href="/login">登录</a>
        </nav>
    </div>

    <div class="hero">
        <h1>欢迎来到 MYCMS</h1>
        <p>全新暗夜主题，更现代的设计语言，为您带来沉浸式内容管理体验。</p>
        <a href="/list" class="btn">开始探索</a>
        <a href="/login" class="btn btn-outline">登录系统</a>
    </div>

    <!-- 文章列表 -->
    <div class="section">
        <div class="section-title"><span class="dot"></span>最新文章</div>
        <div class="cards" id="article-list"><div class="loading">加载中…</div></div>
    </div>

    <!-- 软件列表 -->
    <div class="section">
        <div class="section-title"><span class="dot" style="background:#a78bfa"></span>推荐软件</div>
        <div class="cards" id="software-list"><div class="loading">加载中…</div></div>
    </div>

    <div class="footer">&copy; 2026 MYCMS. Powered by V2.</div>
</div>

<script>
(function() {
    var bp = (window.__BASE_PATH__ || '').replace(/\/$/, '');
    var api = bp + '/api/home.php';

    function formatDate(d) {
        if (!d) return '-';
        var t = d.replace(' ', 'T') + 'Z';
        var date = new Date(t);
        if (isNaN(date.getTime())) return d.substring(0, 10);
        var now = new Date();
        var diff = now - date;
        if (diff < 86400000) return '今天';
        if (diff < 172800000) return '昨天';
        if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
        return d.substring(0, 10);
    }

    function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    fetch(api)
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code !== 0) return;
            var data = res.data;

            // 渲染文章
            var aList = document.getElementById('article-list');
            var articles = data.articles || [];
            if (articles.length === 0) {
                aList.innerHTML = '<div class="empty">暂无文章</div>';
            } else {
                var ah = '';
                articles.forEach(function(a) {
                    ah += '<div class="card">';
                    ah += '<div class="meta">';
                    if (a.category) ah += '<span class="cat">' + escapeHtml(a.category) + '</span>';
                    ah += '<span>' + formatDate(a.published_at || a.updated_at || a.created_at) + '</span>';
                    if (a.view_count) ah += '<span>' + a.view_count + ' 次阅读</span>';
                    ah += '</div>';
                    ah += '<h3><a href="' + bp + '/article/p/' + a.id + '">' + escapeHtml(a.title) + '</a></h3>';
                    ah += '<p>' + escapeHtml(a.content || '') + '</p>';
                    ah += '</div>';
                });
                aList.innerHTML = ah;
            }

            // 渲染软件
            var sList = document.getElementById('software-list');
            var software = data.software || [];
            if (software.length === 0) {
                sList.innerHTML = '<div class="empty">暂无软件</div>';
            } else {
                var sh = '';
                software.forEach(function(s) {
                    sh += '<div class="card">';
                    sh += '<div class="meta">';
                    if (s.category_name) sh += '<span class="cat">' + escapeHtml(s.category_name) + '</span>';
                    if (s.version) sh += '<span class="ver">' + escapeHtml(s.version) + '</span>';
                    if (s.file_size) sh += '<span>' + escapeHtml(s.file_size) + ' MB</span>';
                    sh += '</div>';
                    sh += '<h3>' + escapeHtml(s.name) + '</h3>';
                    sh += '<p>' + escapeHtml((s.description || '').substring(0, 120)) + '</p>';
                    if (s.os_support && s.os_support.length) {
                        sh += '<div class="meta" style="margin-top:8px">';
                        s.os_support.forEach(function(os) {
                            sh += '<span>' + escapeHtml(os) + '</span>';
                        });
                        sh += '</div>';
                    }
                    sh += '</div>';
                });
                sList.innerHTML = sh;
            }
        })
        .catch(function() {
            document.getElementById('article-list').innerHTML = '<div class="empty">加载失败</div>';
            document.getElementById('software-list').innerHTML = '<div class="empty">加载失败</div>';
        });
})();
</script>

</body>
</html>
