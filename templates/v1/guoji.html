<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>国际新闻 - [--site_name--]</title></head>
<body>
[--include(name=header)--]
<main class="page">
<div class="ct-hero"><h1>国际视野，清晰呈现</h1><p>以更少干扰阅读全球新闻、科技变化与产业信号</p></div>
<div class="ct-grid">
[--loop:articles(cat=国际新闻1,num=12,sort=published_at,order=DESC)--]
<article class="ct-card"><a class="ct-card-img" href="[--url--]"><img src="[--cover_image--]" alt="[--title--]" loading="lazy" onerror="this.parentElement.style.display='none'"></a><div class="ct-card-body"><div class="ct-card-top"><span class="ct-cat">[--category--]</span><span class="ct-date">[--published_at--]</span></div><h3><a href="[--url--]">[--title--]</a></h3><p>[--summary--]</p><span class="ct-views"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8s3-5.5 6-5.5S14 8 14 8s-3 5.5-6 5.5S2 8 2 8Z"/><circle cx="8" cy="8" r="1.5"/></svg> [--view_count--] 阅读</span></div></article>
[--/loop:articles--]
</div>
</main>
[--include(name=footer)--]
<style>
.ct-hero{text-align:center;padding:32px 0 24px}.ct-hero h1{margin:0;font-size:28px;font-weight:900;color:var(--text)}.ct-hero p{margin:6px 0 0;color:var(--muted);font-size:14px}
.ct-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding-bottom:32px}
.ct-card{background:var(--card-bg);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:box-shadow .15s}.ct-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.08)}
.ct-card-img{display:block;height:160px;overflow:hidden;background:#eef2f8}.ct-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}.ct-card:hover .ct-card-img img{transform:scale(1.05)}
.ct-card-body{padding:16px 18px}.ct-card-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.ct-cat{font-size:11px;font-weight:700;color:var(--blue);background:rgba(24,119,255,.06);padding:2px 8px;border-radius:3px}[data-theme="dark"] .ct-cat{background:rgba(56,189,248,.1);color:#38bdf8}
.ct-date{font-size:11px;color:var(--muted)}.ct-card-body h3{margin:0 0 6px;font-size:16px;font-weight:800;line-height:1.3}.ct-card-body h3 a{color:var(--text);text-decoration:none}
.ct-card-body p{margin:0 0 10px;font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ct-views{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}.ct-views svg{width:12px;height:12px}
@media(max-width:900px){.ct-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:540px){.ct-grid{grid-template-columns:1fr}}
</style>
</body>
</html>
