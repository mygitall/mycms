<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>软件列表 - [--site_name--]</title>
</head>
<body>
[--include(name=header)--]

<main class="page">
  <div class="soft-hero">
    <h1>软件精选</h1>
    <p>把工具陈列得更克制，突出名称、版本、分类和摘要，适合快速浏览与跳转。</p>
  </div>

  <div class="soft-grid">
    [--loop:software(num=20)--]
    <article class="soft-card">
      <div class="soft-card-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
      </div>
      <div class="soft-card-body">
        <div class="soft-card-head">
          <h3><a href="[--url--]">[--name--]</a></h3>
          <span class="soft-card-ver">v[--version--]</span>
        </div>
        <p>[--summary--]</p>
        <div class="soft-card-foot">
          <span class="soft-card-cat">[--category--]</span>
          <span>[--view_count--] 浏览</span>
          <span>[--download_count--] 下载</span>
          <a class="soft-card-btn" href="[--url--]">查看详情</a>
        </div>
      </div>
    </article>
    [--/loop:software--]
  </div>
</main>

[--include(name=footer)--]

<style>
  .soft-hero { padding: 24px 0 20px; }
  .soft-hero h1 { margin: 0; font-size: 28px; font-weight: 900; color: var(--text); letter-spacing: -.3px; }
  .soft-hero p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
  .soft-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding-bottom: 24px; }
  .soft-card { display: flex; gap: 16px; padding: 20px; background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--radius-lg); box-shadow: var(--shadow); align-items: flex-start; }
  .soft-card-icon { width: 44px; height: 44px; border-radius: 10px; flex: 0 0 44px; display: flex; align-items: center; justify-content: center; color: #fff; background: linear-gradient(145deg, #4298ff, #096cff); }
  .soft-card-icon svg { width: 20px; height: 20px; }
  .soft-card:nth-child(4n+2) .soft-card-icon { background: linear-gradient(145deg, #4798ff, #096bff); }
  .soft-card:nth-child(4n+3) .soft-card-icon { background: linear-gradient(145deg, #8d73ff, #5b3edc); }
  .soft-card:nth-child(4n+4) .soft-card-icon { background: linear-gradient(145deg, #363a43, #111419); }
  .soft-card-body { flex: 1; min-width: 0; }
  .soft-card-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
  .soft-card-head h3 { margin: 0; font-size: 16px; font-weight: 800; }
  .soft-card-head h3 a { color: var(--text); text-decoration: none; }
  .soft-card-head h3 a:hover { color: var(--blue); }
  .soft-card-ver { font-size: 11px; font-weight: 700; color: var(--blue); background: rgba(24,119,255,.08); padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
  .soft-card-body p { margin: 0 0 10px; color: var(--muted); font-size: 13px; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .soft-card-foot { display: flex; align-items: center; gap: 16px; font-size: 11px; color: var(--muted); flex-wrap: wrap; }
  .soft-card-cat { font-weight: 700; color: #6f7b91; }
  [data-theme="dark"] .soft-card-cat { color: #94a3b8; }
  .soft-card-btn { margin-left: auto; padding: 5px 14px; border: 1px solid #9fc3ff; border-radius: 6px; color: #0b6bff; font-size: 11px; font-weight: 700; text-decoration: none; white-space: nowrap; }
  .soft-card-btn:hover { background: #eef5ff; }
  [data-theme="dark"] .soft-card-btn { border-color: #38bdf8; color: #38bdf8; }
  [data-theme="dark"] .soft-card-btn:hover { background: rgba(56,189,248,.1); }
  [data-theme="dark"] .soft-card-ver { background: rgba(56,189,248,.15); color: #38bdf8; }

  @media (max-width: 820px) { .soft-grid { grid-template-columns: 1fr; } .soft-card-foot { gap: 10px; } .soft-card-btn { margin-left: 0; } }
</style>
</body>
</html>
