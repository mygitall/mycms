<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f8fd" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('v1_theme')||'light')</script>
  <title>文章详情</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --border: #e4e6eb;
      --text: #1c1e21;
      --text-muted: #65676b;
      --accent: #f5a623;
      --accent-light: rgba(245,166,35,0.12);
      --success: #31b545;
      --danger: #e74c3c;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
      --ff: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    [data-theme="dark"] {
        --bg: #18191a;
        --surface: #242526;
        --border: #3e4042;
        --text: #e4e6eb;
        --text-muted: #b0b3b8;
        --accent-light: rgba(245,166,35,0.15);
        --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
      }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--ff);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 13.5px;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .back-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .back-btn svg { width: 14px; height: 14px; }
    /* ── 布局 ── */
    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ── 文章主体卡片 ── */
    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    /* ── 文章头部 ── */
    .article-header {
      padding: 28px 32px 0;
    }
    .article-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .article-category {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--accent);
      background: var(--accent-light);
      padding: 3px 9px;
      border-radius: 4px;
    }
    .article-date {
      font-size: 12px;
      color: var(--text-muted);
    }
    .article-featured {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #f5a623, #ff7a00);
      color: #fff;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .article-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }
    .article-author-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .author-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .author-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .author-avatar span {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }
    .author-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .author-name {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
    }
    .article-stats-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .stat-item svg { width: 13px; height: 13px; }

    /* ── 标签 ── */
    .article-tags {
      padding: 16px 32px 0;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 11.5px;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tag:hover { color: var(--accent); border-color: var(--accent); }

    /* ── 正文 ── */
    .article-body {
      padding: 24px 32px 32px;
      font-size: 15.5px;
      line-height: 1.85;
      color: var(--text);
    }
    .article-body p { margin-bottom: 16px; }
    .article-body h1,
    .article-body h2,
    .article-body h3 {
      color: var(--text);
      margin: 24px 0 12px;
      font-weight: 700;
      line-height: 1.4;
    }
    .article-body h1 { font-size: 20px; }
    .article-body h2 { font-size: 18px; }
    .article-body h3 { font-size: 16px; }
    .article-body a { color: var(--accent); text-decoration: none; }
    .article-body a:hover { text-decoration: underline; }
    .article-body img {
      max-width: 100%;
      border-radius: var(--radius-sm);
      margin: 8px 0;
      display: block;
    }
    .article-body iframe {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      border: none;
      border-radius: var(--radius-sm);
      margin: 16px 0;
      display: block;
    }
    .article-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      margin: 16px 0;
      background: var(--accent-light);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--text-muted);
      font-style: italic;
    }
    .article-body pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      overflow-x: auto;
      font-size: 13px;
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      margin: 16px 0;
      line-height: 1.6;
    }
    .article-body code {
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 13px;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
    }
    .article-body ul,
    .article-body ol {
      padding-left: 24px;
      margin-bottom: 16px;
    }
    .article-body li { margin-bottom: 6px; }
    .article-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }
    .article-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin: 16px 0;
    }
    .article-body th,
    .article-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .article-body th { background: var(--bg); font-weight: 600; }

    /* ── 底部操作栏 ── */
    .article-footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .footer-views {
      font-size: 12.5px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .footer-views svg { width: 14px; height: 14px; }
    .footer-source {
      font-size: 12.5px;
    }
    .footer-source a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer-source a:hover { text-decoration: underline; }
    .fav-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border: 1px solid var(--border);
      border-radius: 20px; background: var(--surface);
      color: var(--text-muted); font-size: 13px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s; font-family: var(--ff); white-space: nowrap;
    }
    .fav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .fav-btn.faved { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .fav-btn.faved svg { fill: var(--accent); }
    .fav-btn svg { width: 15px; height: 15px; }
    .footer-left { display: flex; align-items: center; gap: 16px; }

    /* ── 加载中 ── */
    .loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .loading-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    @media (prefers-reduced-motion: reduce) {
      .loading-dot { animation: none; }
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ── 错误 ── */
    .error-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
    }
    .error-icon {
      width: 52px; height: 52px;
      background: rgba(231,76,60,0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .error-icon svg { width: 22px; height: 22px; color: var(--danger); }
    .error-box h2 { font-size: 16px; margin-bottom: 8px; }
    .error-box p { font-size: 13.5px; color: var(--text-muted); margin-bottom: 20px; }
    .error-box .back-btn {
      display: inline-flex;
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-light);
      padding: 8px 20px;
      font-size: 13.5px;
    }

    /* ── 响应式 ── */
	    @media (max-width: 600px) {
	      .article-header { padding: 20px 20px 0; }
	      .article-tags { padding: 14px 20px 0; }
	      .article-body { padding: 20px 20px 24px; font-size: 14.5px; }
	      .article-footer { padding: 14px 20px; }
	      .article-title { font-size: 19px; }
	    }

	    /* ── Nova Portal article refresh ── */
	    :root {
	      --bg: #f5f8fd;
	      --surface: rgba(255,255,255,.96);
	      --border: #e8eef7;
	      --text: #111827;
	      --text-muted: #7b8597;
	      --accent: #126fff;
	      --accent-light: rgba(18,111,255,.09);
	      --success: #17b26a;
	      --danger: #ef4444;
	      --line: var(--border);
	      --card-bg: rgba(255,255,255,.86);
	      --muted: var(--text-muted);
	      --blue: var(--accent);
	      --radius: 16px;
	      --radius-sm: 9px;
	      --shadow: 0 14px 38px rgba(33,74,132,.08);
	      --ff: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
	    }
	    body {
	      background:
	        radial-gradient(circle at 82% 8%, rgba(18,111,255,.12), transparent 26%),
	        linear-gradient(180deg, #f7fbff 0%, #f5f8fd 44%, #eef4fb 100%);
	      letter-spacing: 0;
	    }
	    .back-btn {
	      height: 36px;
	      padding: 0 14px;
	      border-radius: 8px;
	      border-color: #dfe7f2;
	      background: #fff;
	      color: #445066;
	      font-size: 12px;
	      font-weight: 800;
	    }
	    .back-btn:hover {
	      color: #fff;
	      border-color: #0b73ff;
	      background: linear-gradient(180deg,#1f82ff 0%,#096bff 100%);
	      box-shadow: 0 8px 20px rgba(11,107,255,.18);
	    }
	    .container {
	      width: min(1440px, calc(100% - 104px));
	      max-width: none;
	      padding: 22px 0 56px;
	    }
	    .detail-toolbar {
	      display: flex;
	      align-items: center;
	      justify-content: space-between;
	      gap: 16px;
	      margin-bottom: 16px;
	    }
	    .detail-crumb {
	      min-width: 0;
	      display: flex;
	      align-items: center;
	      gap: 9px;
	      color: #7b8597;
	      font-size: 12px;
	      font-weight: 800;
	    }
	    .detail-crumb a {
	      color: #5f6d83;
	      text-decoration: none;
	    }
	    .detail-crumb a:hover {
	      color: var(--accent);
	    }
	    .detail-crumb span:last-child {
	      min-width: 0;
	      max-width: 360px;
	      overflow: hidden;
	      text-overflow: ellipsis;
	      white-space: nowrap;
	      color: #172039;
	    }
	    .detail-layout {
	      display: grid;
	      grid-template-columns: minmax(0, 1fr) 336px;
	      align-items: start;
	      gap: 24px;
	    }
	    .article-card {
	      position: relative;
	      overflow: hidden;
	      border-radius: 18px;
	      border-color: var(--border);
	      background: var(--surface);
	      box-shadow: var(--shadow);
	      backdrop-filter: blur(18px);
	    }
	    .article-card::before {
	      content: "";
	      position: absolute;
	      inset: 0 0 auto 0;
	      height: 230px;
	      background:
	        radial-gradient(circle at 82% 28%, rgba(18,111,255,.2), transparent 26%),
	        linear-gradient(135deg, rgba(255,255,255,.98), rgba(234,243,255,.84));
	      pointer-events: none;
	    }
	    .article-card::after {
	      content: "";
	      position: absolute;
	      top: 0;
	      right: 0;
	      width: min(420px, 42%);
	      height: 230px;
	      background:
	        linear-gradient(122deg, transparent 0 52%, rgba(255,255,255,.7) 53%, transparent 54%),
	        linear-gradient(156deg, transparent 0 60%, rgba(18,111,255,.12) 61%, transparent 62%);
	      pointer-events: none;
	    }
	    .article-header,
	    .article-tags,
	    .article-body,
	    .article-footer {
	      position: relative;
	      z-index: 1;
	    }
	    .article-header {
	      padding: 34px 42px 0;
	    }
	    .article-meta-row {
	      gap: 10px;
	      margin-bottom: 16px;
	    }
	    .article-category,
	    .article-featured {
	      height: 28px;
	      display: inline-flex;
	      align-items: center;
	      padding: 0 12px;
	      border-radius: 999px;
	      font-size: 11px;
	      letter-spacing: 0;
	    }
	    .article-category {
	      color: var(--accent);
	      background: rgba(18,111,255,.08);
	      border: 1px solid rgba(18,111,255,.16);
	    }
	    .article-date {
	      height: 28px;
	      display: inline-flex;
	      align-items: center;
	      color: #758198;
	      font-size: 12px;
	      font-weight: 700;
	    }
	    .article-featured {
	      background: linear-gradient(180deg,#1f82ff 0%,#096bff 100%);
	      color: #fff;
	      box-shadow: 0 8px 18px rgba(11,107,255,.16);
	    }
	    .article-title {
	      max-width: 760px;
	      margin-bottom: 22px;
	      color: #111936;
	      font-size: clamp(30px, 3.2vw, 48px);
	      line-height: 1.12;
	      font-weight: 950;
	      letter-spacing: 0;
	    }
	    .article-author-row {
	      padding: 18px 0 24px;
	      border-bottom-color: rgba(125,142,168,.18);
	    }
	    .author-avatar {
	      width: 42px;
	      height: 42px;
	      background: linear-gradient(145deg,#39a2ff,#096bff);
	      border-radius: 12px;
	      box-shadow: 0 10px 24px rgba(18,111,255,.18);
	    }
	    .author-name {
	      font-size: 14px;
	      font-weight: 850;
	      color: #172039;
	    }
	    .article-stats-row {
	      gap: 14px;
	      flex-wrap: wrap;
	    }
	    .stat-item {
	      color: #7b8597;
	      font-weight: 700;
	    }
	    .article-tags {
	      padding: 18px 42px 0;
	      gap: 8px;
	    }
	    .tag {
	      border-color: #dfe7f2;
	      background: rgba(255,255,255,.72);
	      color: #697488;
	      border-radius: 999px;
	      font-weight: 700;
	      padding: 5px 12px;
	    }
	    .tag:hover {
	      color: var(--accent);
	      border-color: rgba(18,111,255,.28);
	      background: rgba(18,111,255,.07);
	    }
	    .article-body {
	      padding: 30px 42px 38px;
	      color: #26334c;
	      font-size: 16px;
	      line-height: 1.9;
	    }
	    .article-body p {
	      margin-bottom: 18px;
	    }
	    .article-body h1,
	    .article-body h2,
	    .article-body h3 {
	      color: #111936;
	      font-weight: 900;
	      letter-spacing: 0;
	    }
	    .article-body a {
	      color: var(--accent);
	      font-weight: 800;
	    }
	    .article-body img,
	    .article-body iframe {
	      border-radius: 14px;
	      box-shadow: 0 12px 32px rgba(33,74,132,.09);
	    }
	    .article-body blockquote {
	      border-left: 0;
	      border: 1px solid rgba(18,111,255,.16);
	      background: rgba(18,111,255,.06);
	      border-radius: 12px;
	      color: #516075;
	      font-style: normal;
	    }
	    .article-body pre,
	    .article-body code {
	      background: #f3f7fc;
	      border-color: #dfe7f2;

	    .article-footer {
	      padding: 18px 42px 22px;

	      border-top-color: rgba(125,142,168,.16);

	    .footer-views,
	    .footer-source {
	      color: #7b8597;
	      font-weight: 700;
	    }

	      color: var(--accent);
	      font-weight: 800;
	    }

	      height: 38px;
	      padding: 0 18px;

	      color: var(--accent);
	      font-weight: 850;
	    }
	    .fav-btn:hover,
	    .fav-btn.faved {
	      border-color: #0b73ff;

	    }

	    }

	      color: var(--accent);
	      border-color: rgba(18,111,255,.24);

	    }
	    .related-panel {
	      position: sticky;
	      top: 88px;
	      overflow: hidden;
	      border: 1px solid var(--border);
	      border-radius: 18px;
	      background: rgba(255,255,255,.94);
	      box-shadow: var(--shadow);
	      backdrop-filter: blur(18px);
	    }
	    .related-head {
	      display: flex;
	      align-items: center;
	      justify-content: space-between;
	      gap: 12px;
	      padding: 20px 20px 14px;
	      border-bottom: 1px solid rgba(125,142,168,.14);
	    }
	    .related-head h2 {
	      color: #111936;
	      font-size: 17px;
	      line-height: 1.2;
	      font-weight: 950;
	      letter-spacing: 0;
	    }
	    .related-head a {
	      flex: 0 0 auto;
	      color: var(--accent);
	      font-size: 12px;
	      font-weight: 850;
	      text-decoration: none;
	    }
	    .related-list {
	      display: flex;
	      flex-direction: column;
	      padding: 8px 10px 10px;
	    }
	    .related-item {
	      display: grid;
	      grid-template-columns: 30px minmax(0, 1fr);
	      gap: 12px;
	      padding: 13px 10px;
	      border-radius: 12px;
	      color: inherit;
	      text-decoration: none;
	      transition: background .16s ease, transform .16s ease;
	    }
	    .related-item + .related-item {
	      border-top: 1px solid rgba(125,142,168,.11);
	    }
	    .related-item:hover {
	      background: rgba(18,111,255,.06);
	      transform: translateY(-1px);
	    }
	    .related-index {
	      width: 30px;
	      height: 30px;
	      display: inline-flex;
	      align-items: center;
	      justify-content: center;
	      border-radius: 9px;
	      background: rgba(18,111,255,.08);
	      color: var(--accent);
	      font-size: 12px;
	      font-weight: 950;
	    }
	    .related-title {

  }

    .site-footer .footer-bottom {
      width: calc(100% - 32px);
    }
  }

  /* ── 收藏 Toast ────────────────────────── */
  .fav-toast {
    position: absolute; right: 16px; bottom: 60px;
    padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700;
    animation: fav-toast-in .25s ease-out;
    z-index: 10; pointer-events: none;
  }
  .fav-toast-success { background: rgba(23,178,106,.1); border: 1px solid rgba(23,178,106,.25); color: #17b26a; }
  .fav-toast-error   { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); color: #ef4444; }
  @keyframes fav-toast-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>

<script>
// ─── 路径自动检测 ──────────────────────────────────────
(function () {
  const injected = window.__BASE_PATH__;
  if (injected !== undefined) { window._detectedBasePath = injected; return; }
  const parts = window.location.pathname.split('/').filter(Boolean);
  const idx = parts.indexOf('article');
  if (idx >= 0) { window._detectedBasePath = '/' + parts.slice(0, idx).join('/'); }
  else { window._detectedBasePath = '/' + parts.slice(0, -1).join('/'); }
})();
const BASE_PATH = (window._detectedBasePath || '').replace(/\/+$/, '');
const VIEW_API = BASE_PATH + '/article/api/view';
const LIST_API = BASE_PATH + '/article/api/list';
const LIST_URL = BASE_PATH + '/article-list';

// ─── 文章 ID 自动检测（兼容直接访问和路由注入两种方式）───
const articleId = (function() {
  // 优先使用 index.php 注入的 ID
  if (window.__ARTICLE_ID__ !== undefined) return window.__ARTICLE_ID__;
  // 从 URL 路径自动解析：/article/p/123 → 123
  const match = window.location.pathname.match(/\/article\/p\/(\d+)/i);
  return match ? parseInt(match[1], 10) : null;
})();

// ─── 带超时的 fetch ───────────────────────────────────
async function safeFetch(url, options = {}) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 10000); // 10秒超时
  try {
    const res = await fetch(url, { ...options, signal: controller.signal });
    clearTimeout(timeout);
    return res;
  } catch (e) {
    clearTimeout(timeout);
    if (e.name === 'AbortError') {
      throw new Error('请求超时，请检查网络连接');
    }
    throw e;
  }
}

function renderTags(tags) {
  if (!tags) return '';
  let tagList = [];
  try {
    if (typeof tags === 'string') {
      tags = tags.trim();
      // 优先尝试 JSON 数组格式
      if (tags.startsWith('[')) {
        const parsed = JSON.parse(tags);
        if (Array.isArray(parsed) && parsed.length) tagList = parsed;
      } else if (tags.includes(',')) {
        // 逗号分隔格式：a, b, c
        tagList = tags.split(',').map(t => t.trim()).filter(Boolean);
      } else {
        // 单个标签
        tagList = [tags];
      }
    } else if (Array.isArray(tags)) {
      tagList = tags;
    }
  } catch (_) {
    // 解析失败，尝试逗号分隔兜底
    if (typeof tags === 'string' && tags.includes(',')) {
      tagList = tags.split(',').map(t => t.trim()).filter(Boolean);
    }
  }
  if (!tagList.length) return '';
  return `<div class="article-tags">` +
    tagList.map(t => `<span class="tag">${escapeHtml(String(t))}</span>`).join('') +
    `</div>`;
}

function renderContent(content) {
  if (!content) return '<p style="color:var(--text-muted);font-style:italic">暂无正文内容</p>';
  return sanitizeHtml(content);
}

function renderArticleCover(article) {
  const cover = normalizeImageUrl(article.cover_image || article.cover || '');
  if (cover) {
    return `
      <figure class="article-cover-wrap">
        <img class="article-cover" src="${escapeHtml(cover)}" alt="${escapeHtml(article.title || '文章封面')}" width="400" height="225" loading="lazy" onerror="this.parentElement.innerHTML=renderInlineCoverFallback('MYCMS')">
      </figure>`;
  }
  return `<figure class="article-cover-wrap">${renderCoverFallback(article.category || article.title || 'MYCMS')}</figure>`;
}

function renderCoverFallback(label) {
  return `<div class="article-cover-fallback"><span>${escapeHtml(label)} · 精选阅读</span></div>`;
}

function renderInlineCoverFallback(label) {
  return `<div class="article-cover-fallback"><span>${escapeHtml(label)} · 精选阅读</span></div>`;
}

function normalizeImageUrl(url) {
  url = String(url || '').trim();
  if (!url) return '';
  if (/^(https?:)?\/\//i.test(url) || url.charAt(0) === '/' || /^data:image\//i.test(url)) {
    return url;
  }
  return '';
}

function renderReadingNudge(content) {
  const text = plainText(content);
  if (text.length > 120) return '';
  return `
    <div class="reading-nudge">
      <strong>继续探索更多内容</strong>
      这篇内容较短，右侧已为你整理相关文章和热门阅读，可以继续浏览同类主题。
    </div>`;
}

function plainText(html) {
  const div = document.createElement('div');
  div.innerHTML = sanitizeHtml(html || '');
  return (div.textContent || '').replace(/\s+/g, ' ').trim();
}

async function loadRelatedArticles(article) {
  const box = document.getElementById('related-list');
  const popularBox = document.getElementById('popular-list');
  if (!box && !popularBox) return;

  try {
    const candidates = [];
    const popular = [];
    async function pull(payload) {
      const res = await safeFetch(LIST_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) return;
      const json = await res.json();
      const list = json && json.code === 0 && json.data ? (json.data.list || []) : [];
      list.forEach(function(item) {
        if (!item || Number(item.id) === Number(articleId)) return;
        if (candidates.some(function(old) { return Number(old.id) === Number(item.id); })) return;
        candidates.push(item);
      });
    }
    async function pullPopular() {
      const res = await safeFetch(LIST_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          page: 1,
          page_size: 8,
          sort_by: 'view_count',
          sort_order: 'DESC'
        })
      });
      if (!res.ok) return;
      const json = await res.json();
      const list = json && json.code === 0 && json.data ? (json.data.list || []) : [];
      list.forEach(function(item) {
        if (!item || Number(item.id) === Number(articleId)) return;
        if (popular.some(function(old) { return Number(old.id) === Number(item.id); })) return;
        popular.push(item);
      });
    }

    if (article.category) {
      await pull({
        page: 1,
        page_size: 6,
        category: article.category,
        sort_by: 'published_at',
        sort_order: 'DESC'
      });
    }

    await pullPopular();

    if (candidates.length < 5) {
      popular.forEach(function(item) {
        if (candidates.length >= 5) return;
        if (candidates.some(function(old) { return Number(old.id) === Number(item.id); })) return;
        candidates.push(item);
      });
    }

    if (box) box.innerHTML = renderRelatedArticles(candidates.slice(0, 5));
    if (popularBox) popularBox.innerHTML = renderRelatedArticles(popular.slice(0, 5));
  } catch (e) {
    console.warn('相关文章加载失败:', e);
    if (box) box.innerHTML = '<div class="related-empty">暂时没有可展示的相关文章。</div>';
    if (popularBox) popularBox.innerHTML = '<div class="related-empty">暂时没有可展示的热门文章。</div>';
  }
}

function renderRelatedArticles(list) {
  if (!list || !list.length) {
    return '<div class="related-empty">暂时没有可展示的相关文章。</div>';
  }
  return list.map(function(item, index) {
    const title = escapeHtml(item.title || '未命名文章');
    const category = escapeHtml(item.category || '文章');
    const date = formatDate(item.published_at || item.created_at);
    const views = Number(item.view_count || 0);
    return `
      <a class="related-item" href="${BASE_PATH}/article/p/${encodeURIComponent(item.id)}">
        <span class="related-index">${String(index + 1).padStart(2, '0')}</span>
        <span>
          <span class="related-title">${title}</span>
          <span class="related-meta"><span>${category}</span><span>${date}</span><span>${views} 阅读</span></span>
        </span>
      </a>`;
  }).join('');
}

/**
 * HTML 安全过滤器：允许安全标签，剥离危险标签和属性（防止存储型 XSS）
 * 允许: p, h1-h6, img, a, blockquote, pre, code, ul, ol, li, hr, table, strong, em, b, i, u, s, sup, sub, br, span, div
 * 剥离: script, iframe, object, embed, form, style, link, meta, svg, math, button, input, textarea, select
 * 剥离: 所有 on* 事件属性，javascript: URL，危险 data: URL
 */
function sanitizeHtml(html) {
  if (!html) return '';

  // 信任的视频平台 iframe：先提取保护
  const trustedVideoHosts = [
    'player.bilibili.com',
    'www.youtube.com',
    'player.youku.com',
    'v.qq.com',
    'open.iqiyi.com',
    'player.vimeo.com',
    'www.douyin.com',
  ];
  const trustedRe = new RegExp(
    '<iframe\\b[^>]*src="(https?:)?//(' + trustedVideoHosts.join('|').replace(/\./g, '\\.') + ')[^"]*"[^>]*>[\\s\\S]*?</iframe>',
    'gi'
  );
  const preserved = [];
  let clean = html.replace(trustedRe, function(m) {
    preserved.push(m);
    return '\x00IFRAME' + (preserved.length - 1) + '\x00';
  });

  // 剥离其他危险标签
  const dangerousTags = [
    /<script\b[^>]*>[\s\S]*?<\/script>/gi,
    /<iframe\b[^>]*>[\s\S]*?<\/iframe>/gi,
    /<object\b[^>]*>[\s\S]*?<\/object>/gi,
    /<embed\b[^>]*>/gi,
    /<form\b[^>]*>[\s\S]*?<\/form>/gi,
    /<input\b[^>]*>/gi,
    /<button\b[^>]*>[\s\S]*?<\/button>/gi,
    /<select\b[^>]*>[\s\S]*?<\/select>/gi,
    /<textarea\b[^>]*>[\s\S]*?<\/textarea>/gi,
    /<link\b[^>]*>/gi,
    /<style\b[^>]*>[\s\S]*?<\/style>/gi,
    /<meta\b[^>]*>/gi,
    /<!--[\s\S]*?-->/g,
    /<svg\b[^>]*>[\s\S]*?<\/svg>/gi,
    /<math\b[^>]*>[\s\S]*?<\/math>/gi,
    / on\w+\s*=\s*"[^"]*"/gi,
    / on\w+\s*=\s*'[^']*'/gi,
    / on\w+\s*=\s*[^\s>]*/gi,
    /javascript\s*:/gi,
  ];
  dangerousTags.forEach(function(p) { clean = clean.replace(p, ''); });

  // 恢复受信任的视频平台 iframe
  preserved.forEach(function(iframe, i) {
    clean = clean.replace('\x00IFRAME' + i + '\x00', iframe);
  });

  return clean;
}

function renderError(msg) {
  return `
  <div class="error-box">
    <div class="error-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
      </svg>
    </div>
    <h2>加载失败</h2>
    <p>${escapeHtml(msg)}</p>
    <a href="${LIST_URL}" class="back-btn">返回文章列表</a>
  </div>`;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    return new Intl.DateTimeFormat('zh-CN', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    }).format(new Date(dateStr)).replace(/\//g, '-');
  } catch { return dateStr; }
}

// ─── 收藏功能 ──────────────────────────────────────────
const FAVORITE_API  = BASE_PATH + '/article/api/favorite.php';
const UNFAVORITE_API = BASE_PATH + '/article/api/unfavorite.php';
const FAV_STATUS_API = BASE_PATH + '/article/api/favorite_status.php';

function isLoggedIn() {
  return !!localStorage.getItem('v1_username');
}

window.toggleFavorite = async function() {
  if (!isLoggedIn()) {
    showFavToast('请先登录', 'error');
    var overlay = document.getElementById('v1ModalOverlay');
    if (overlay) { overlay.removeAttribute('hidden'); document.body.style.overflow = 'hidden'; }
    return;
  }
  const btn = document.getElementById('fav-btn');
  const isFaved = btn && btn.classList.contains('faved');
  const api = isFaved ? UNFAVORITE_API : FAVORITE_API;

  if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }

  try {
    const res = await fetch(api, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ article_id: articleId })
    });
    const json = await res.json();
    if (json.code === 0) {
      updateFavUI(!isFaved);
      showFavToast(isFaved ? '已取消收藏' : '收藏成功', 'success');
    } else if (json.code === 401) {
      showFavToast('登录已过期，请重新登录', 'error');
      var overlay = document.getElementById('v1ModalOverlay');
      if (overlay) { overlay.removeAttribute('hidden'); document.body.style.overflow = 'hidden'; }
    } else {
      showFavToast(json.msg || '操作失败', 'error');
    }
  } catch (e) {
    showFavToast('网络错误，请稍后重试', 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.style.opacity = ''; }
  }
};

async function checkFavStatus() {
  if (!isLoggedIn() || !articleId) return;
  try {
    const res = await fetch(FAV_STATUS_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ article_id: articleId })
    });
    const json = await res.json();
    if (json.code === 0) {
      updateFavUI(json.data && json.data[articleId] === true);
    }
  } catch (e) { /* 静默失败 */ }
}

function showFavToast(msg, type) {
  var existing = document.querySelector('.fav-toast');
  if (existing) existing.remove();
  var toast = document.createElement('div');
  toast.className = 'fav-toast fav-toast-' + (type || 'success');
  toast.textContent = msg;
  toast.setAttribute('role', 'status');
  toast.setAttribute('aria-live', 'polite');
  var footer = document.querySelector('.article-footer');
  if (footer) {
    footer.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 2500);
  }
}

function updateFavUI(faved) {
  const btn = document.getElementById('fav-btn');
  const text = document.getElementById('fav-text');
  const icon = document.getElementById('fav-icon');
  if (!btn) return;
  if (faved) {
    btn.classList.add('faved');
    if (text) text.textContent = '已收藏';
    if (icon) icon.setAttribute('fill', 'currentColor');
  } else {
    btn.classList.remove('faved');
    if (text) text.textContent = '收藏';
    if (icon) icon.setAttribute('fill', 'none');
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadArticle);
} else {
  loadArticle();
}
