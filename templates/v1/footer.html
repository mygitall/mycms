<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="brand">
        <div class="brand-mark"><i></i></div>
        <div class="brand-text">
          <strong>[--site_name--]</strong>
          <span>科技资讯与软件精选平台</span>
        </div>
      </div>
      <p class="footer-desc">克制、清晰、面向内容的 CMS 前台模板。<br>用更少视觉噪音承载更多信息。</p>
    </div>
    <div class="footer-links">
      <div class="footer-col">
        <strong>导航</strong>
        <a href="/">首页</a>
        <a href="/article-list">文章</a>
        <a href="/software-list">软件</a>
        <a href="/search">搜索</a>
      </div>
      <div class="footer-col">
        <strong>栏目</strong>
        [--loop:columns(pid=0)--]
        <a href="[--url--]">[--name--]</a>
        [--/loop:columns--]
      </div>
    </div>
  </div>
  <div class="footer-bottom">&copy; [--current_year--] [--site_name--]. Built with MYCMS.</div>
</footer>

<style>
  .site-footer { border-top: 1px solid var(--line); background: var(--card-bg); margin-top: 32px; }

  .footer-brand .brand { display: flex; align-items: center; gap: 13px; }

  .footer-brand .brand-mark::before, .footer-brand .brand-mark::after { content: ""; position: absolute; top: 4px; height: 31px; border-radius: 6px; background: linear-gradient(135deg, #5fa1ff 0%, #136eff 52%, #0038c7 100%); }
  .footer-brand .brand-mark::before { left: 1px; width: 13px; }
  .footer-brand .brand-mark::after { right: 0; width: 13px; }
  .footer-brand .brand-mark i { position: absolute; left: 13px; top: 4px; width: 12px; height: 31px; border-radius: 6px; background: linear-gradient(135deg, #0b59e9 0%, #57a3ff 100%); transform: rotate(-21deg); transform-origin: center; }
  .footer-brand .brand-text strong { display: block; font-size: 18px; line-height: 19px; letter-spacing: .2px; color: #172039; font-weight: 800; }
  [data-theme="dark"] .footer-brand .brand-text strong { color: #f1f5f9; }

  .footer-col { display: flex; flex-direction: column; gap: 10px; }
  .footer-col strong { font-size: 13px; color: var(--text); }
  .footer-col a { color: var(--muted); font-size: 13px; text-decoration: none; }
  .footer-col a:hover { color: var(--blue); }
  .footer-bottom { width: min(1568px, calc(100% - 104px)); margin: 0 auto; padding: 16px 0 24px; border-top: 1px solid var(--line); color: var(--muted); font-size: 12px; text-align: center; }
