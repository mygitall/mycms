<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#f5f8fd" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('v1_theme')||'light')</script>
<title>软件详情 - [--site_name--]</title>
</head>
<body>
[--include(name=header)--]

[--loop:software_detail--]
<main class="sd-page" id="main-content">
  <div class="sd-layout">
    <section class="sd-main">
      <header class="sd-hero">
        <div class="sd-icon" aria-hidden="true"></div>
        <div class="sd-meta">
          <h1 class="sd-title">[--name--]</h1>
          <div class="sd-ver">v[--version--]</div>
          <div class="sd-stats">
            <span class="sd-stat">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              [--view_count--] 浏览
            </span>
            <span class="sd-stat">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0-4-4m4 4 4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
              [--download_count--] 下载
            </span>
          </div>
        </div>
      </header>

      <article class="sd-card">
        <h2 class="sd-card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>
          软件介绍
        </h2>
        <div class="sd-desc">[--description--]</div>
      </article>

      <article class="sd-card">
        <h2 class="sd-card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>
          更新日志
        </h2>
        <div class="sd-desc">[--changelog--]</div>
      </article>
    </section>

    <aside class="sd-side">
      <div class="sd-dl-card">
        <a class="sd-dl-btn" href="[--download_urls--]" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0-4-4m4 4 4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
          前往下载
        </a>
        <div class="sd-info-list">
          <div class="sd-info-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2h8l4 4v16H6z"/><path d="M14 2v4h4"/></svg>
            <span>文件大小</span>
            <span>[--file_size--]</span>
          </div>
          <div class="sd-info-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="5" width="16" height="11" rx="1.5"/><path d="M12 16v4M8 20h8"/></svg>
            <span>操作系统</span>
            <span>[--os_support--]</span>
          </div>
          <div class="sd-info-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5v9l9 9 9-9L13 4H5a1 1 0 0 0-1 1Z"/><circle cx="9" cy="9" r="1.5"/></svg>
            <span>标签</span>
            <span>[--tags--]</span>
          </div>
        </div>
      </div>
      <a class="sd-back" href="/software-list">&larr; 返回软件列表</a>
    </aside>
  </div>
</main>
[--/loop:software_detail--]

[--include(name=footer)--]

<script>
// 动态设置页面标题
(function(){
  var t=document.querySelector('.sd-title');
  if(t&&t.textContent.trim()){
    document.title=t.textContent.trim()+' - [--site_name--]';
  }
})();
</script>

<style>
  .sd-page { width: min(1568px, calc(100% - 104px)); margin: 0 auto; padding: 24px 0 32px; }
  .sd-layout { display: flex; gap: 24px; align-items: flex-start; }
  .sd-main { flex: 1; min-width: 0; }
  .sd-hero { display: flex; align-items: flex-start; gap: 24px; padding-bottom: 28px; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
  .sd-icon { width: 96px; height: 96px; flex: 0 0 96px; border-radius: 22px; background: radial-gradient(circle at 36% 12%, rgba(77,203,255,.72), transparent 33%), linear-gradient(180deg, #27b8ff 0%, #156df7 92%); box-shadow: 0 12px 24px rgba(0,113,255,.2); position: relative; }
  .sd-icon:before, .sd-icon:after { content: ""; position: absolute; left: 50%; top: 50%; background: #fff; border-radius: 8px; transform: translate(-50%,-50%); }
  .sd-icon:before { width: 38px; height: 6px; } .sd-icon:after { width: 6px; height: 38px; }
  .sd-meta { flex: 1; padding-top: 4px; }
  .sd-title { margin: 0 0 12px; font-size: 32px; font-weight: 900; color: var(--text); letter-spacing: -.5px; }
  .sd-ver { display: inline-flex; align-items: center; height: 30px; padding: 0 14px; border-radius: 6px; background: #edf3fb; color: #006df7; font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  [data-theme="dark"] .sd-ver { background: rgba(56,189,248,.15); color: #38bdf8; }
  .sd-stats { display: flex; align-items: center; gap: 24px; color: var(--muted); font-size: 14px; }
  .sd-stat { display: flex; align-items: center; gap: 6px; }
  .sd-stat svg { width: 18px; height: 18px; }
  .sd-card { background: var(--card-bg); border: 1px solid var(--line); border-radius: 12px; padding: 28px 32px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .sd-card-title { display: flex; align-items: center; gap: 12px; margin: 0 0 20px; font-size: 18px; font-weight: 800; color: var(--text); }
  .sd-card-title svg { width: 22px; height: 22px; color: var(--blue); }
  .sd-desc { color: var(--text); font-size: 15px; line-height: 1.85; }
  .sd-desc img { max-width: 100%; border-radius: 8px; }
  .sd-desc a { color: var(--blue); }
  .sd-side { width: 340px; flex: 0 0 340px; position: sticky; top: 80px; }
  .sd-dl-card { background: var(--card-bg); border: 1px solid var(--line); border-radius: 12px; padding: 28px 24px; box-shadow: var(--shadow); }
  .sd-dl-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 52px; background: linear-gradient(180deg, #0578ff 0%, #0563f5 100%); border-radius: 10px; color: #fff; font-size: 16px; font-weight: 700; text-decoration: none; box-shadow: 0 8px 20px rgba(0,106,255,.2); }
  .sd-dl-btn svg { width: 20px; height: 20px; }
  .sd-dl-btn:hover { background: linear-gradient(180deg, #006ae8 0%, #0052d4 100%); }
  .sd-info-list { margin-top: 24px; display: flex; flex-direction: column; }
  .sd-info-row { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .sd-info-row:last-child { border-bottom: 0; }
  .sd-info-row svg { width: 20px; height: 20px; flex: 0 0 20px; color: var(--muted); }
  .sd-info-row span:nth-child(2) { flex: 1; color: var(--muted); }
  .sd-info-row span:last-child { color: var(--text); font-weight: 600; text-align: right; }
  .sd-back { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 20px; color: var(--muted); font-size: 14px; text-decoration: none; }
  .sd-back:hover { color: var(--blue); }

  @media (max-width: 860px) {
    .sd-page { width: calc(100% - 32px); }
    .sd-layout { flex-direction: column; }
    .sd-side { width: 100%; flex: none; position: static; }
    .sd-hero { flex-direction: column; align-items: flex-start; }
    .sd-title { font-size: 24px; }
    .sd-icon { width: 72px; height: 72px; flex: 0 0 72px; border-radius: 18px; }
    .sd-icon:before { width: 28px; height: 5px; }
    .sd-icon:after { width: 5px; height: 28px; }
  }
  @media (max-width: 480px) {
    .sd-page { width: calc(100% - 20px); }
    .sd-title { font-size: 20px; }
    .sd-icon { width: 56px; height: 56px; flex: 0 0 56px; }
    .sd-card { padding: 20px 18px; }
    .sd-card-title { font-size: 15px; }
    .sd-ver { font-size: 13px; height: 26px; }
    .sd-dl-btn { height: 46px; font-size: 14px; }
  }
</style>
</body>
</html>
