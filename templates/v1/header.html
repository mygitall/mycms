<style>
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
  .skip-link:focus { position:absolute; left:12px; top:10px; z-index:9999; width:auto; height:auto; margin:0; padding:8px 16px; clip:auto; background:var(--blue); color:#fff; border-radius:6px; font-weight:700; font-size:13px; text-decoration:none; white-space:nowrap; }
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    color-scheme: light;
    --page-bg: #f5f8fd;
    --card-bg: #ffffff;
    --line: #e7edf6;
    --text: #111827;
    --muted: #7b8597;
    --blue: #1977ff;
    --blue-2: #0b6bff;
    --radius-lg: 16px;
    --shadow: 0 10px 32px rgba(34,78,143,0.08);
  }
  html, body {
    margin: 0; min-height: 100%; background: var(--page-bg); color: var(--text);
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision;
  }
  body { overflow-x: hidden; touch-action: manipulation; -webkit-overflow-scrolling: touch; }
  h1, h2, h3, h4, h5, h6, p, figure, blockquote, dl, dd { margin: 0; }
  a { color: inherit; text-decoration: none; }
  button, input, textarea, select { font: inherit; color: inherit; }
  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--blue); outline-offset: 2px; border-radius: 3px;
  }
  h1, h2, h3 { text-wrap: balance; scroll-margin-top: 80px; }
  .stat-nb, .al-rank-n, .rank, .al-card-views, .today-item em, em { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  button { appearance: none; -webkit-appearance: none; }
  input[type="search"] { appearance: none; -webkit-appearance: none; }
  strong { font-weight: 700; }
  b { font-weight: inherit; }
  small, em { font-style: normal; }
  .site-header { height: 68px; padding-top: env(safe-area-inset-top); background: rgba(255,255,255,0.96); border-bottom: 1px solid #e9eef6; display: flex; align-items: center; }
  .header-inner { width: min(1568px, calc(100% - 104px)); height: 68px; margin: 0 auto; display: flex; align-items: center; }
  .brand { width: 275px; display: flex; align-items: center; flex-shrink: 0; }
  .brand-mark { width: 35px; height: 39px; margin-right: 13px; position: relative; transform: skewX(-10deg); }
  .brand-mark::before, .brand-mark::after { content: ""; position: absolute; top: 4px; height: 31px; border-radius: 6px; background: linear-gradient(135deg,#5fa1ff 0%,#136eff 52%,#0038c7 100%); box-shadow: 0 10px 22px rgba(13,103,255,0.22); }
  .brand-mark::before { left: 1px; width: 13px; }
  .brand-mark::after { right: 0; width: 13px; }
  .brand-mark i { position: absolute; left: 13px; top: 4px; width: 12px; height: 31px; border-radius: 6px; background: linear-gradient(135deg,#0b59e9 0%,#57a3ff 100%); transform: rotate(-21deg); transform-origin: center; }
  .brand-text strong { display: block; font-size: 18px; line-height: 19px; letter-spacing: .2px; color: #172039; font-weight: 800; }
  .brand-text span { display: block; margin-top: 3px; font-size: 11px; color: #657084; font-weight: 600; letter-spacing: .2px; }
  .main-nav { margin-left: 32px; display: flex; height: 68px; align-items: center; gap: 32px; flex: 1 1 auto; white-space: nowrap; }
  .main-nav a { height: 68px; line-height: 68px; color: #16223a; text-decoration: none; font-size: 13px; font-weight: 700; position: relative; }
  .main-nav a.active { color: #096cff; }
  .main-nav a.active::after { content: ""; position: absolute; left: 50%; bottom: 0; width: 42px; height: 3px; border-radius: 2px; background: #096cff; transform: translateX(-50%); }
  .header-actions { display: flex; align-items: center; gap: 22px; flex-shrink: 0; transition: opacity .18s ease; }
  .search { width: 253px; height: 36px; border-radius: 7px; background: #f3f5f9; display: flex; align-items: center; padding: 0 6px 0 14px; }
  .search input { flex: 1; height: 100%; border: 0; background: transparent; font-size: 12px; font-weight: 600; color: #16223a; min-width: 0; }
.search input:focus-visible { outline: none; }
  .search input::placeholder { color: #9aa3b3; }
  .search svg { width: 17px; height: 17px; flex-shrink: 0; stroke: #111827; stroke-width: 2; cursor: pointer; }
  .btn-header { width: 62px; height: 36px; border: 1px solid #e2e7f0; background: #fff; border-radius: 7px; color: #1f2937; font-size: 12px; font-weight: 700; cursor: pointer; }
  .btn-header.primary { width: 91px; border-color: #0b73ff; background: linear-gradient(180deg,#1f82ff 0%,#096bff 100%); color: #fff; box-shadow: 0 6px 16px rgba(11,107,255,.22); }
  .theme-toggle-btn { width: 36px; height: 36px; border: 1px solid #e2e7f0; border-radius: 7px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #1f2937; margin-left: 6px; }
  [data-theme="dark"] .theme-toggle-btn .icon-sun { display: block; }
  [data-theme="dark"] .theme-toggle-btn .icon-moon { display: none; }
  [data-theme="light"] .theme-toggle-btn .icon-sun, :root .theme-toggle-btn .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle-btn .icon-moon, :root .theme-toggle-btn .icon-moon { display: block; }

  /* dark theme */
  [data-theme="dark"] { color-scheme: dark; --page-bg: #0f172a; --card-bg: #1e293b; --line: #334155; --text: #e2e8f0; --muted: #94a3b8; --blue: #38bdf8; --blue-2: #38bdf8; --shadow: 0 10px 32px rgba(0,0,0,0.4); }
  [data-theme="dark"] .site-header { background: rgba(30,41,59,0.96); border-bottom-color: #334155; }
  [data-theme="dark"] .brand-text strong { color: #f1f5f9; }
  [data-theme="dark"] .brand-text span { color: #94a3b8; }
  [data-theme="dark"] .main-nav a { color: #94a3b8; }
  [data-theme="dark"] .main-nav a.active, [data-theme="dark"] .main-nav a.active::after { color: #38bdf8; background: #38bdf8; }
  [data-theme="dark"] .search { background: #0f172a; }
  [data-theme="dark"] .search input { color: #e2e8f0; }
  [data-theme="dark"] .search input::placeholder { color: #64748b; }
  [data-theme="dark"] .search svg { stroke: #e2e8f0; }
  [data-theme="dark"] .btn-header { background: #1e293b; border-color: #334155; color: #e2e8f0; }
  [data-theme="dark"] .btn-header.primary { border-color: #38bdf8; background: linear-gradient(180deg,#38bdf8 0%,#0ea5e9 100%); color: #0f172a; }
  [data-theme="dark"] .theme-toggle-btn { background: #1e293b; border-color: #334155; color: #e2e8f0; }

  .nav-toggle { display: none; width: 40px; height: 40px; border: 1px solid #e2e7f0; border-radius: 7px; background: #fff; cursor: pointer; align-items: center; justify-content: center; color: #1f2937; flex-shrink: 0; }
  [data-theme="dark"] .nav-toggle { background: #1e293b; border-color: #334155; color: #e2e8f0; }
  .nav-toggle svg { width: 20px; height: 20px; }
  .main-nav.open { display: flex; }

  @media (max-width: 1280px) { .header-inner { width: calc(100% - 48px); } .main-nav { margin-left: 28px; gap: 24px; } .search { width: 180px; } }
  @media (max-width: 1180px) {
    .header-inner { width: calc(100% - 40px); }
    .brand { width: 230px; }
    .main-nav { margin-left: 18px; gap: 18px; }
    .search { width: 170px; }
    .btn-header { display: none; }
    .header-actions { gap: 10px; }
  }
  @media (max-width: 980px) {
    .main-nav { display: none; position: absolute; top: 68px; left: 0; right: 0; background: var(--card-bg); border-bottom: 1px solid var(--line); padding: 8px 20px 12px; flex-direction: column; gap: 2px; height: auto; margin: 0; box-shadow: 0 8px 24px rgba(0,0,0,.08); z-index: 99; }
    .main-nav.open { display: flex; }
    .main-nav a { height: 42px; line-height: 42px; font-size: 14px; font-weight: 600; }
    .main-nav a.active::after { display: none; }
    .main-nav a.active { background: rgba(9,108,255,.06); border-radius: 8px; padding: 0 12px; margin: 0 -12px; }
    .nav-toggle { display: flex; }
  }
  @media (max-width: 860px) { .site-header { height: auto; position: sticky; top: 0; z-index: 100; }
    .header-inner { width: calc(100% - 32px); height: 56px; padding: 0; flex-wrap: nowrap; gap: 10px; }
    .brand { width: auto; flex: 1; min-width: 0; }
    .brand-text span { display: none; }
    .main-nav { display: none; position: absolute; top: 56px; left: 0; right: 0; background: var(--card-bg); border-bottom: 1px solid var(--line); padding: 8px 16px 12px; flex-direction: column; gap: 2px; height: auto; margin: 0; box-shadow: 0 8px 24px rgba(0,0,0,.08); z-index: 99; }
    .main-nav.open { display: flex; }
    .main-nav a { height: 42px; line-height: 42px; font-size: 14px; font-weight: 600; }
    .main-nav a.active::after { display: none; }
    .main-nav a.active { background: rgba(9,108,255,.06); border-radius: 8px; padding: 0 12px; margin: 0 -12px; }
    .search { flex: 1; width: auto; min-width: 0; }
    .btn-header { display: none; }
    .theme-toggle-btn { flex-shrink: 0; }
    .nav-toggle { display: flex; }
  }

  /* ── 登录弹窗 ───────────────────────────── */
  .v1-modal-overlay {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.45); backdrop-filter: blur(4px);
    padding: 20px;
  }
  .v1-modal-overlay[hidden] { display: none; }
  .v1-modal-card {
    position: relative;
    width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto;
    background: var(--card-bg); border: 1px solid var(--line);
    border-radius: 18px; padding: 32px 30px 26px;
    box-shadow: 0 24px 56px rgba(0,0,0,.18);
    animation: v1-modal-in .2s ease-out;
  }
  @keyframes v1-modal-in {
    from { opacity: 0; transform: translateY(12px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .v1-modal-close {
    position: absolute; right: 14px; top: 14px;
    width: 32px; height: 32px; border: 0; border-radius: 8px;
    background: transparent; color: var(--muted); font-size: 22px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    line-height: 1; transition: background .12s, color .12s;
  }
  .v1-modal-close:hover { background: rgba(0,0,0,.04); color: var(--text); }
  [data-theme="dark"] .v1-modal-close:hover { background: rgba(255,255,255,.06); }
  .v1-modal-tabs { display: flex; gap: 0; margin-bottom: 22px; }
  .v1-modal-tab {
    flex: 1; height: 38px; border: 0; border-bottom: 2px solid var(--line);
    background: transparent; color: var(--muted); font-size: 14px;
    font-weight: 700; cursor: pointer; transition: color .15s, border-color .15s;
  }
  .v1-modal-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .v1-modal-tab:hover { color: var(--text); }
  .v1-modal-msg {
    padding: 10px 12px; border-radius: 9px; font-size: 12px; font-weight: 600;
    margin-bottom: 16px; display: none; align-items: center; gap: 8px;
  }
  .v1-modal-msg.error { display: flex; background: rgba(239,68,68,.07); border: 1px solid rgba(239,68,68,.18); color: #ef4444; }
  .v1-modal-msg.success { display: flex; background: rgba(23,178,106,.07); border: 1px solid rgba(23,178,106,.18); color: #17b26a; }
  .v1-modal-msg svg { width: 16px; height: 16px; flex-shrink: 0; }
  .v1-modal-form { margin: 0; }
  .v1-field { margin-bottom: 16px; }
  .v1-field label { display: block; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .v1-input-wrap { position: relative; display: flex; align-items: center; }
  .v1-input-wrap svg { position: absolute; left: 12px; width: 16px; height: 16px; color: var(--muted); pointer-events: none; }
  .v1-input-wrap input {
    width: 100%; height: 44px; padding: 0 14px 0 38px;
    border: 1.5px solid var(--line); border-radius: 10px;
    background: var(--card-bg); color: var(--text); font-size: 14px; font-weight: 600;
    outline: none; transition: border-color .15s, box-shadow .15s;
  }
  .v1-input-wrap input::placeholder { color: #9aa3b3; font-weight: 400; }
  .v1-input-wrap input:focus-visible { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(18,111,255,.1); }
  [data-theme="dark"] .v1-input-wrap input { background: rgba(15,23,42,.6); border-color: #334155; }
  [data-theme="dark"] .v1-input-wrap input:focus-visible { box-shadow: 0 0 0 3px rgba(56,189,248,.12); }
  .v1-toggle-pw {
    position: absolute; right: 10px; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted); background: none; border: none; padding: 0;
  }
  .v1-toggle-pw:hover { color: var(--text); }
  .v1-toggle-pw svg { width: 16px; height: 16px; position: static; }
  .v1-field-row { display: flex; align-items: center; }
  .v1-remember { display: flex; align-items: center; gap: 7px; cursor: pointer; color: var(--muted); font-weight: 600; font-size: 13px; }
  .v1-remember input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--blue); cursor: pointer; }
  .v1-modal-submit {
    width: 100%; height: 44px; border: none; border-radius: 10px;
    background: linear-gradient(180deg, #1f82ff 0%, #096bff 100%);
    color: #fff; font-size: 15px; font-weight: 800; cursor: pointer;
    box-shadow: 0 9px 22px rgba(11,107,255,.2);
    transition: transform .12s, box-shadow .12s;
  }
  .v1-modal-submit:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(11,107,255,.28); }
  .v1-modal-submit:active { transform: translateY(0); }
  .v1-modal-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
  [data-theme="dark"] .v1-modal-submit { background: linear-gradient(180deg, #38bdf8 0%, #0284c7 100%); color: #0f172a; box-shadow: 0 9px 22px rgba(14,165,233,.18); }
  .v1-modal-help { text-align: center; margin-top: 16px; font-size: 11px; color: var(--muted); }

  /* ── 已登录用户区 ────────────────────────── */
  .v1-user-area { display: none; align-items: center; gap: 8px; flex-shrink: 0; opacity: 0; transform: translateY(2px); transition: opacity .18s ease, transform .18s ease; }
  .header-actions.is-authenticated .btn-header { display: none; }
  .header-actions.is-authenticated .v1-user-area { display: flex; opacity: 1; transform: translateY(0); }
  .v1-user-avatar {
    width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(145deg, #4298ff, #096cff);
    color: #fff; font-size: 13px; font-weight: 900;
    box-shadow: 0 6px 14px rgba(18,111,255,.18);
  }
  .v1-user-avatar::after { content: attr(data-letter); }
  .v1-user-name {
    font-size: 12px; font-weight: 700; color: var(--text);
    max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .v1-logout-btn {
    height: 30px; padding: 0 12px; border: 1px solid var(--line);
    border-radius: 7px; background: var(--card-bg); color: var(--muted);
    font-size: 11px; font-weight: 700; cursor: pointer;
    transition: border-color .12s, color .12s, background .12s;
  }
  .v1-logout-btn:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,.05); }
  [data-theme="dark"] .v1-user-avatar { background: linear-gradient(145deg, #38bdf8, #0284c7); }
  [data-theme="dark"] .v1-logout-btn { background: rgba(15,23,42,.6); }
  @media (max-width: 860px) {
    .header-actions.is-authenticated .search { display: none; }
    .header-actions.is-authenticated .v1-user-name { display: inline-block; max-width: 64px; }
    .header-actions.is-authenticated { gap: 8px; }
  }
  @media (max-width: 420px) {
    .header-actions.is-authenticated .v1-user-name { max-width: 54px; }
    .header-actions.is-authenticated .v1-logout-btn { padding: 0 10px; }
  }
  @media (max-width: 480px) {
    .v1-modal-card { padding: 24px 18px 20px; border-radius: 14px; }
  }
</style>

<a href="#main-content" class="sr-only skip-link">跳到主内容</a>

<nav class="site-header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark"><i></i></div>
      <div class="brand-text">
        <strong>[--site_name--]</strong>
        <span>科技资讯与软件精选平台</span>
      </div>
    </div>
    <nav class="main-nav" id="v1NavLinks">
      <a class="active" href="[--site_url--]">首页</a>
      [--loop:columns(pid=0)--]
      <a href="[--url--]">[--name--]</a>
      [--/loop:columns--]
      <a href="/article-list">文章</a>
      <a href="/software-list">软件</a>
      <a href="/search">搜索</a>
    </nav>
    <div class="header-actions">
      <form class="search" action="/search" method="get" onsubmit="return this.q.value.trim()!==''">
        <label for="header-search" class="sr-only">搜索</label>
        <input id="header-search" type="search" name="q" placeholder="搜索文章、软件…" value="" autocomplete="off">
        <button type="submit" aria-label="搜索" style="border:0;background:none;cursor:pointer;padding:0;display:flex">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7"></circle><path d="M16.6 16.6 21 21"></path></svg>
        </button>
      </form>
      <button class="btn-header" id="v1LoginBtn" type="button">登录</button>
      <button class="btn-header primary" id="v1RegBtn" type="button">注册</button>
      <span class="v1-user-area" id="v1UserArea">
        <span class="v1-user-avatar" id="v1UserAvatar" aria-hidden="true"></span>
        <span class="v1-user-name" id="v1UserName"></span>
        <button class="v1-logout-btn" id="v1LogoutBtn" type="button">退出</button>
      </span>
      <button class="theme-toggle-btn" id="v1ThemeToggle" type="button" aria-label="切换主题" title="切换深色/浅色">
        <svg aria-hidden="true" class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg aria-hidden="true" class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="nav-toggle" id="v1NavToggle" type="button" aria-label="菜单" onclick="document.getElementById('v1NavLinks').classList.toggle('open')">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </div>
</nav>

<!-- ═══ 登录/注册弹窗 ═══ -->
<div class="v1-modal-overlay" id="v1ModalOverlay" hidden>
  <div class="v1-modal-card" id="v1ModalCard" role="dialog" aria-modal="true" aria-label="登录注册">
    <button class="v1-modal-close" id="v1ModalClose" type="button" aria-label="关闭">&times;</button>
    <div class="v1-modal-tabs">
      <button class="v1-modal-tab active" data-tab="login">登录</button>
      <button class="v1-modal-tab" data-tab="register">注册</button>
    </div>

    <!-- 消息 -->
    <div class="v1-modal-msg" id="v1ModalMsg" aria-live="polite" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="v1ModalMsgText"></span>
    </div>

    <!-- 登录表单 -->
    <form class="v1-modal-form" id="v1LoginForm" novalidate>
      <input type="hidden" name="_token" id="v1CsrfToken" value="">
      <div class="v1-field">
        <label for="v1Username">用户名</label>
        <div class="v1-input-wrap">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="v1Username" name="username" placeholder="请输入用户名…" autocomplete="username" required>
        </div>
      </div>
      <div class="v1-field">
        <label for="v1Password">密码</label>
        <div class="v1-input-wrap">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="v1Password" name="password" placeholder="请输入密码…" autocomplete="current-password" required>
          <button type="button" class="v1-toggle-pw" id="v1TogglePw" aria-label="显示密码" tabindex="-1">
            <svg class="v1-eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="v1-eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="v1-field v1-field-row">
        <label class="v1-remember">
          <input type="checkbox" name="remember" id="v1Remember">
          30 天内自动登录
        </label>
      </div>
      <button type="submit" class="v1-modal-submit" id="v1LoginSubmit">登 录</button>
    </form>

    <!-- 注册表单 -->
    <form class="v1-modal-form" id="v1RegForm" style="display:none" novalidate>
      <input type="hidden" name="_token" value="">
      <div class="v1-field">
        <label for="v1RegUsername">用户名</label>
        <div class="v1-input-wrap">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="v1RegUsername" name="username" placeholder="请输入用户名…" autocomplete="username" required>
        </div>
      </div>
      <div class="v1-field">
        <label for="v1RegPassword">密码</label>
        <div class="v1-input-wrap">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="v1RegPassword" name="password" placeholder="请输入密码…" autocomplete="new-password" required>
        </div>
      </div>
      <div class="v1-field">
        <label for="v1RegPassword2">确认密码</label>
        <div class="v1-input-wrap">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="v1RegPassword2" name="password2" placeholder="请再次输入密码…" autocomplete="new-password" required>
        </div>
      </div>
      <button type="submit" class="v1-modal-submit" id="v1RegSubmit">注 册</button>
    </form>

    <p class="v1-modal-help">默认账号 admin / admin123</p>
  </div>
</div>

<script>
(function(){
  var STORAGE_KEY='v1_theme';
  var toggle=document.getElementById('v1ThemeToggle');
  if(!toggle)return;
  function setTheme(name){document.documentElement.setAttribute('data-theme',name);localStorage.setItem(STORAGE_KEY,name);}
  var current=localStorage.getItem(STORAGE_KEY)||'light';
  setTheme(current);
  var nav=document.getElementById('v1NavLinks');
  if(nav){
    var aliases={'文章管理':'文章','软件管理':'软件'};
    Array.prototype.forEach.call(nav.querySelectorAll('a'),function(a){
      var text=a.textContent.trim();
      if(aliases[text]) a.textContent=aliases[text];
    });
    var seen={};
    Array.prototype.forEach.call(nav.querySelectorAll('a'),function(a){
      var key;
      try{
        var u=new URL(a.getAttribute('href'),location.origin);
        key=u.pathname.replace(/\/+$/,'')||'/';
        if(u.search) key+=u.search;
      }catch(e){ key=a.getAttribute('href')||a.textContent.trim(); }
      if(seen[key]){ a.remove(); return; }
      seen[key]=true;
    });
    var path=(location.pathname.replace(/\/+$/,'')||'/');
    Array.prototype.forEach.call(nav.querySelectorAll('a'),function(a){a.classList.remove('active');});
    var target='首页';
    if(location.search.indexOf('col=22')>=0||path==='/guoji') target='国际新闻1';
    else if(path==='/wurenji') target='无人机';
    else if(path.indexOf('/article')===0||path==='/article-list') target='文章';
    else if(path.indexOf('/software')===0||path==='/software-list') target='软件';
    else if(path.indexOf('/search')===0) target='搜索';
    var matched=false;
    Array.prototype.forEach.call(nav.querySelectorAll('a'),function(a){
      if(!matched&&a.textContent.trim()===target){a.classList.add('active');matched=true;}
    });
    if(!matched){
      var home=nav.querySelector('a');
      if(home) home.classList.add('active');
    }
  }
  toggle.addEventListener('click',function(){
    var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    setTheme(next);
  });
  // 移动端点击菜单外部关闭
  document.addEventListener('click',function(e){
    var nav=document.getElementById('v1NavLinks');
    var toggle=document.getElementById('v1NavToggle');
    if(nav&&nav.classList.contains('open')&&!nav.contains(e.target)&&e.target!==toggle&&!toggle.contains(e.target)){nav.classList.remove('open');}
  });
})();

/* ═══ 登录弹窗逻辑 ═══ */
(function(){
  var overlay = document.getElementById('v1ModalOverlay');
  var card = document.getElementById('v1ModalCard');
  var loginForm = document.getElementById('v1LoginForm');
  var regForm = document.getElementById('v1RegForm');
  var msgBox = document.getElementById('v1ModalMsg');
  var msgText = document.getElementById('v1ModalMsgText');
  var tabs = document.querySelectorAll('.v1-modal-tab');
  var currentTab = 'login';

  if (!overlay) return;

  var AUTH_NAME_KEY = 'v1_username';
  var headerActions = document.querySelector('.header-actions');

  function getCookie(name) {
    var m = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/[.$?*|{}()\[\]\\\/\+^]/g, '\\$&') + '=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : '';
  }

  // ── 获取 CSRF token ──
  function getCsrfToken() {
    var m = document.cookie.match(/csrf_token=([^;]+)/);
    return m ? m[1] : '';
  }

  function ensureCsrfToken() {
    var token = getCsrfToken();
    if (token) return Promise.resolve(token);
    return fetch('/api/csrf_token.php', { credentials: 'same-origin' })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var next = d && d.data && d.data.csrf_token ? d.data.csrf_token : getCsrfToken();
        document.getElementById('v1CsrfToken').value = next || '';
        return next || '';
      })
      .catch(function() { return getCsrfToken(); });
  }

  document.getElementById('v1CsrfToken').value = getCsrfToken();

  // ── 打开弹窗 ──
  function openModal(tab) {
    currentTab = tab || 'login';
    overlay.removeAttribute('hidden');
    document.body.style.overflow = 'hidden';
    switchTab(currentTab);
    hideMsg();
    document.getElementById(currentTab === 'login' ? 'v1Username' : 'v1RegUsername').focus();
  }

  // ── 关闭弹窗 ──
  function closeModal() {
    overlay.setAttribute('hidden', '');
    document.body.style.overflow = '';
    loginForm.reset(); regForm.reset(); hideMsg();
    document.getElementById('v1LoginSubmit').disabled = false;
    document.getElementById('v1LoginSubmit').textContent = '登 录';
    document.getElementById('v1RegSubmit').disabled = false;
    document.getElementById('v1RegSubmit').textContent = '注 册';
  }

  // ── 切换登录/注册 ──
  function switchTab(tab) {
    currentTab = tab;
    tabs.forEach(function(t){ t.classList.toggle('active', t.getAttribute('data-tab') === tab); });
    loginForm.style.display = tab === 'login' ? '' : 'none';
    regForm.style.display = tab === 'register' ? '' : 'none';
    hideMsg();
  }

  // ── 消息 ──
  function showMsg(text, type) {
    msgText.textContent = text;
    msgBox.className = 'v1-modal-msg ' + type;
    msgBox.style.display = 'flex';
  }
  function hideMsg() { msgBox.style.display = 'none'; }

  // ── 密码可见性 ──
  document.getElementById('v1TogglePw').addEventListener('click', function() {
    var pw = document.getElementById('v1Password');
    var isPw = pw.type === 'password';
    pw.type = isPw ? 'text' : 'password';
    this.querySelector('.v1-eye-open').style.display = isPw ? 'none' : '';
    this.querySelector('.v1-eye-closed').style.display = isPw ? '' : 'none';
  });

  // ── 登录态管理 ──
  function setAuthUser(name) {
    name = (name || '').trim();
    if (name) {
      localStorage.setItem(AUTH_NAME_KEY, name);
      document.getElementById('v1UserName').textContent = name;
      document.getElementById('v1UserAvatar').setAttribute('data-letter', name.charAt(0).toUpperCase());
      if (headerActions) headerActions.classList.add('is-authenticated');
    } else {
      localStorage.removeItem(AUTH_NAME_KEY);
      document.getElementById('v1UserName').textContent = '';
      document.getElementById('v1UserAvatar').setAttribute('data-letter', '');
      if (headerActions) headerActions.classList.remove('is-authenticated');
    }
  }

  function verifyAuthState() {
    return fetch('/api/check_login.php', { credentials: 'same-origin' })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d && d.data && d.data.loggedIn && d.data.username) {
          setAuthUser(d.data.username);
          return d.data.username;
        }
        setAuthUser('');
        return '';
      })
      .catch(function() {
        setAuthUser(localStorage.getItem(AUTH_NAME_KEY) || '');
        return localStorage.getItem(AUTH_NAME_KEY) || '';
      });
  }

  // ── 登出 ──
  document.getElementById('v1LogoutBtn').addEventListener('click', function() {
    var btn = this;
    btn.disabled = true;
    btn.textContent = '退出中…';
    fetch('/api/logout.php', { method: 'POST', credentials: 'same-origin' })
      .then(function(r) { return r.json().catch(function(){ return {}; }); })
      .then(function() { setAuthUser(''); })
      .catch(function() { setAuthUser(''); })
      .finally(function() {
        btn.disabled = false;
        btn.textContent = '退出';
      });
  });

  // 页面加载时：先用本地用户名做即时渲染，再用服务端 cookie 校准
  setAuthUser(localStorage.getItem(AUTH_NAME_KEY) || '');
  verifyAuthState();
  ensureCsrfToken();

  // ── 登录提交 ──
  loginForm.addEventListener('submit', function(e) {
    e.preventDefault(); hideMsg();
    var u = document.getElementById('v1Username').value.trim();
    var p = document.getElementById('v1Password').value.trim();
    if (!u) { showMsg('请输入用户名', 'error'); return; }
    if (!p) { showMsg('请输入密码', 'error'); return; }
    var btn = document.getElementById('v1LoginSubmit');
    btn.disabled = true; btn.textContent = '登录中…';
    ensureCsrfToken().then(function(token) {
      var fd = new FormData();
      fd.append('_token', token);
      fd.append('username', u);
      fd.append('password', p);
      if (document.getElementById('v1Remember').checked) fd.append('remember', '1');
      return fetch('/api/login.php', { method: 'POST', body: fd, credentials: 'same-origin' });
    }).then(function(res) {
      return res.json().then(function(j) { return { ok: res.ok, json: j }; });
    }).then(function(r) {
      if (r.json && r.json.code === 0 && r.json.data && r.json.data.username) {
        setAuthUser(r.json.data.username);
        showMsg('登录成功', 'success');
        btn.disabled = false; btn.textContent = '登 录';
        setTimeout(closeModal, 260);
        return;
      }
      showMsg((r.json && r.json.msg) || '登录失败', 'error');
      btn.disabled = false; btn.textContent = '登 录';
    }).catch(function() {
      showMsg('网络错误，请稍后重试', 'error');
      btn.disabled = false; btn.textContent = '登 录';
    });
  });

  // ── 注册提交 ──
  regForm.addEventListener('submit', function(e) {
    e.preventDefault(); hideMsg();
    var u = document.getElementById('v1RegUsername').value.trim();
    var p = document.getElementById('v1RegPassword').value;
    var p2 = document.getElementById('v1RegPassword2').value;
    if (!u) { showMsg('请输入用户名', 'error'); return; }
    if (u.length < 2) { showMsg('用户名至少 2 个字符', 'error'); return; }
    if (!p) { showMsg('请输入密码', 'error'); return; }
    if (p.length < 8) { showMsg('密码至少 8 位', 'error'); return; }
    if (!/[A-Za-z]/.test(p) || !/[0-9]/.test(p)) { showMsg('密码需包含字母和数字', 'error'); return; }
    if (p !== p2) { showMsg('两次密码不一致', 'error'); return; }
    var btn = document.getElementById('v1RegSubmit');
    btn.disabled = true; btn.textContent = '注册中…';
    ensureCsrfToken().then(function(token) {
      var fd = new FormData();
      fd.append('_token', token);
      fd.append('username', u);
      fd.append('password', p);
      fd.append('password2', p2);
      return fetch('/api/register.php', { method: 'POST', body: fd, credentials: 'same-origin' });
    })
      .then(function(res) { return res.json().then(function(j) { return { ok: res.ok, json: j }; }); })
      .then(function(r) {
        if (r.json && r.json.code === 0) {
          showMsg('注册成功，请登录', 'success');
          regForm.reset();
          setTimeout(function() { switchTab('login'); }, 800);
          return;
        }
        showMsg((r.json && r.json.msg) || '注册失败', 'error');
        btn.disabled = false; btn.textContent = '注 册';
      })
      .catch(function() { showMsg('网络错误，请稍后重试', 'error'); btn.disabled = false; btn.textContent = '注 册'; });
  });

  // ── 事件绑定 ──
  document.getElementById('v1LoginBtn').addEventListener('click', function() { openModal('login'); });
  document.getElementById('v1RegBtn').addEventListener('click', function() { openModal('register'); });
  document.getElementById('v1ModalClose').addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && !overlay.hasAttribute('hidden')) closeModal(); });
  tabs.forEach(function(t) { t.addEventListener('click', function() { switchTab(t.getAttribute('data-tab')); }); });
})();
</script>
