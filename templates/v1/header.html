<style>
  :root {
    color-scheme: dark;
    --bg: #050609;
    --bg-2: #090b10;
    --panel: rgba(255, 255, 255, 0.045);
    --panel-strong: rgba(255, 255, 255, 0.075);
    --panel-soft: rgba(255, 255, 255, 0.03);
    --border: rgba(255, 255, 255, 0.11);
    --border-soft: rgba(255, 255, 255, 0.075);
    --text: #f4f4f5;
    --muted: #a1a1aa;
    --subtle: #71717a;
    --accent: #8b9cff;
    --accent-2: #d8b4fe;
    --accent-3: #67e8f9;
    --radius: 24px;
    --radius-sm: 16px;
    --shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
  }

  /* 浅色主题 */
  [data-theme="light"] {
    color-scheme: light;
    --bg: #f8f9fb;
    --bg-2: #f0f1f5;
    --panel: rgba(0, 0, 0, 0.03);
    --panel-strong: rgba(0, 0, 0, 0.06);
    --panel-soft: rgba(0, 0, 0, 0.02);
    --border: rgba(0, 0, 0, 0.1);
    --border-soft: rgba(0, 0, 0, 0.07);
    --text: #1a1a2e;
    --muted: #6b7280;
    --subtle: #9ca3af;
    --accent: #4f5ed4;
    --accent-2: #7c3aed;
    --accent-3: #0891b2;
    --shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
  }
  [data-theme="light"] body {
    background:
      radial-gradient(circle at 18% -10%, rgba(79,94,212,0.08), transparent 34rem),
      radial-gradient(circle at 92% 8%, rgba(124,58,237,0.05), transparent 32rem),
      linear-gradient(180deg, #f8f9fb 0%, #f0f1f5 42%, #f8f9fb 100%);
  }
  [data-theme="light"] body::before {
    background-image: linear-gradient(rgba(0,0,0,0.028) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.024) 1px, transparent 1px);
  }
  [data-theme="light"] .site-nav {
    background: rgba(248,249,251,0.78);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
  }
  [data-theme="light"] .nav-links a:hover { background: rgba(0,0,0,0.04); }
  [data-theme="light"] .nav-search { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.08); }
  [data-theme="light"] .button { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: var(--text); }
  [data-theme="light"] .button.primary { color: #fff; }
  [data-theme="light"] .bento-card, [data-theme="light"] .glass-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
    border-color: rgba(0,0,0,0.08);
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  }
  [data-theme="light"] .bento-card::before, [data-theme="light"] .glass-card::before {
    background: linear-gradient(135deg, rgba(0,0,0,0.04), transparent 36%);
    opacity: .28;
  }
  [data-theme="light"] .meta-pill { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.06); }
  [data-theme="light"] .story-row, [data-theme="light"] .software-tile, [data-theme="light"] .metric-cell,
  [data-theme="light"] .tag-category-nav a, [data-theme="light"] .nav-tree a, [data-theme="light"] .glass-card li a,
  [data-theme="light"] .column-chip { background: rgba(0,0,0,0.02); }
  [data-theme="light"] .story-row:hover, [data-theme="light"] .software-tile:hover { background: rgba(0,0,0,0.04); }
  [data-theme="light"] .eyebrow { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.06); color: var(--muted); }
  [data-theme="light"] .gradient-text {
    background: linear-gradient(110deg, #1a1a2e, #4f5ed4 46%, #7c3aed 82%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  [data-theme="light"] .mini-item { border-color: rgba(0,0,0,0.06); }
  [data-theme="light"] .article-link, [data-theme="light"] .software-link { border-color: rgba(0,0,0,0.06); }
  [data-theme="light"] .search-panel button { background: #1a1a2e; color: #fff; }
  [data-theme="light"] .search-panel input { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.08); }
  [data-theme="light"] .soft-glow { background: radial-gradient(circle, rgba(79,94,212,0.12), transparent 68%); }
  [data-theme="light"] .brand-mark { box-shadow: 0 12px 34px rgba(79,94,212,0.18); }
  @media (max-width: 920px) {
    [data-theme="light"] .nav-links { background: rgba(248,249,251,0.96); }
  }

  *, *::before, *::after { box-sizing: border-box; }
  html { background: var(--bg); scroll-behavior: smooth; }
  body {
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
    background:
      radial-gradient(circle at 18% -10%, rgba(139, 156, 255, 0.2), transparent 34rem),
      radial-gradient(circle at 92% 8%, rgba(216, 180, 254, 0.14), transparent 32rem),
      linear-gradient(180deg, #050609 0%, #090b10 42%, #050609 100%);
    color: var(--text);
    font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    letter-spacing: 0;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.024) 1px, transparent 1px);
    background-size: 72px 72px;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent 70%);
  }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }
  button, input { font: inherit; }

  .site-shell { width: min(1240px, calc(100% - 40px)); margin: 0 auto; position: relative; z-index: 1; }
  .site-nav {
    position: sticky;
    top: 0;
    z-index: 50;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(5, 6, 9, 0.72);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
  }
  .nav-inner {
    width: min(1240px, calc(100% - 40px));
    height: 68px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-weight: 720;
    font-size: 17px;
    letter-spacing: 0;
  }
  .brand-mark {
    width: 30px;
    height: 30px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(139,156,255,0.96), rgba(216,180,254,0.9));
    box-shadow: 0 12px 34px rgba(139,156,255,0.26);
  }
  .brand span:last-child { color: rgba(244,244,245,0.92); }
  .nav-links { display: flex; align-items: center; gap: 4px; }
  .nav-links a {
    color: var(--muted);
    font-size: 14px;
    padding: 9px 12px;
    border-radius: 999px;
    transition: color .18s ease, background .18s ease;
  }
  .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .nav-search {
    display: flex;
    align-items: center;
    width: min(270px, 28vw);
    min-width: 190px;
    gap: 10px;
    padding: 10px 14px;
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    background: rgba(255,255,255,0.045);
  }
  .nav-search input { width: 100%; border: 0; outline: 0; background: transparent; color: var(--text); font-size: 14px; }
  .nav-search input::placeholder { color: var(--subtle); }
  .nav-search svg { width: 16px; height: 16px; color: var(--subtle); flex: 0 0 auto; }
  .nav-toggle { display: none; }

  .hero { padding: 86px 0 42px; }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: fit-content;
    color: rgba(244,244,245,0.78);
    font-size: 13px;
    padding: 8px 12px;
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    background: rgba(255,255,255,0.045);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .eyebrow::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-3);
    box-shadow: 0 0 22px rgba(103,232,249,0.55);
  }
  .hero h1, .page-title {
    max-width: 920px;
    margin: 20px 0 0;
    font-size: clamp(44px, 8vw, 96px);
    line-height: 0.95;
    font-weight: 780;
    letter-spacing: 0;
  }
  .gradient-text {
    background: linear-gradient(110deg, #ffffff, #cfd7ff 46%, #f0d5ff 82%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .hero-copy, .page-copy {
    max-width: 660px;
    margin: 22px 0 0;
    color: var(--muted);
    font-size: clamp(16px, 2vw, 20px);
    line-height: 1.75;
  }
  .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 30px; }
  .button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 0 18px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--text);
    background: rgba(255,255,255,0.06);
    font-size: 14px;
    font-weight: 620;
  }
  .button.primary {
    border-color: rgba(139,156,255,0.44);
    background: linear-gradient(135deg, rgba(139,156,255,0.9), rgba(216,180,254,0.72));
    color: #fff;
    box-shadow: 0 18px 50px rgba(139,156,255,0.2);
  }

  .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; padding: 26px 0 72px; }
  .bento-card, .glass-card {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.035));
    box-shadow: var(--shadow);
  }
  .bento-card::before, .glass-card::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(135deg, rgba(255,255,255,0.11), transparent 36%);
    opacity: .42;
  }
  .card-pad { position: relative; padding: clamp(22px, 3vw, 34px); }
  .span-3 { grid-column: span 3; }
  .span-4 { grid-column: span 4; }
  .span-5 { grid-column: span 5; }
  .span-6 { grid-column: span 6; }
  .span-7 { grid-column: span 7; }
  .span-8 { grid-column: span 8; }
  .span-12 { grid-column: span 12; }
  .tall { min-height: 430px; }
  .section-title { margin: 0; font-size: clamp(24px, 3vw, 38px); line-height: 1.08; font-weight: 760; }
  .section-kicker { margin: 0 0 12px; color: var(--accent-3); font-size: 12px; font-weight: 700; text-transform: uppercase; }
  .muted { color: var(--muted); }
  .meta-row { display: flex; flex-wrap: wrap; gap: 10px; color: var(--subtle); font-size: 13px; margin-top: 14px; }
  .meta-pill {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 0 10px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
  }
  .article-link, .software-link {
    display: block;
    padding: 20px 0;
    border-top: 1px solid rgba(255,255,255,0.075);
  }
  .article-link:first-child, .software-link:first-child { border-top: 0; padding-top: 0; }
  .article-link h3, .software-link h3 { margin: 0; font-size: clamp(18px, 2vw, 24px); line-height: 1.25; font-weight: 700; }
  .article-link p, .software-link p { margin: 10px 0 0; color: var(--muted); line-height: 1.75; font-size: 14px; }
  .mini-list { display: grid; gap: 12px; }
  .mini-item {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    padding: 14px 0;
    border-top: 1px solid rgba(255,255,255,0.075);
    color: var(--muted);
  }
  .mini-item:first-child { border-top: 0; }
  .mini-item strong { color: var(--text); font-size: 15px; }
  .soft-glow {
    position: absolute;
    width: 280px;
    height: 280px;
    right: -120px;
    top: -120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(139,156,255,0.23), transparent 68%);
    pointer-events: none;
  }
  .stat { display: grid; gap: 8px; }
  .stat strong { font-size: clamp(34px, 5vw, 62px); line-height: 1; }
  .stat span { color: var(--muted); font-size: 14px; line-height: 1.6; }
  .page-main { padding-bottom: 72px; }
  .content-grid { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 16px; align-items: start; }
  .stack { display: grid; gap: 16px; }
  .prose { color: rgba(244,244,245,0.86); line-height: 1.85; font-size: 16px; }
  .prose img { border-radius: 18px; border: 1px solid var(--border-soft); }
  .prose a { color: #cfd7ff; }
  .tag-breadcrumb, .tag-breadcrumb a { color: var(--subtle); font-size: 13px; }
  .tag-breadcrumb a:hover { color: var(--text); }
  .tag-category-nav ul, .nav-tree, .glass-card ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
  .tag-category-nav a, .nav-tree a, .glass-card li a {
    display: block;
    color: var(--muted);
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.035);
  }
  .tag-category-nav a:hover, .nav-tree a:hover, .glass-card li a:hover { color: var(--text); background: rgba(255,255,255,0.065); }
  .search-panel { display: flex; gap: 12px; margin-top: 28px; }
  .search-panel input {
    flex: 1;
    min-width: 0;
    height: 52px;
    padding: 0 18px;
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    outline: none;
    color: var(--text);
    background: rgba(255,255,255,0.055);
  }
  .search-panel button {
    height: 52px;
    padding: 0 22px;
    border: 0;
    border-radius: 999px;
    background: #f4f4f5;
    color: #09090b;
    font-weight: 700;
    cursor: pointer;
  }
  .home-shell { padding: 34px 0; }
  .masonry-flow {
    column-count: 3;
    column-gap: 16px;
    padding: 20px 0 34px;
  }
  .masonry-item {
    display: inline-block;
    width: 100%;
    margin: 0 0 16px;
    break-inside: avoid;
    -webkit-column-break-inside: avoid;
    vertical-align: top;
  }
  .home-hero {
    display: block;
    padding: 0;
  }
  .home-hero-main {
    min-height: 0;
    display: block;
    padding: clamp(20px, 3vw, 30px);
  }
  .home-hero-main h1 {
    max-width: 560px;
    margin: 18px 0 0;
    font-size: clamp(34px, 3.8vw, 52px);
    line-height: 1;
    font-weight: 790;
  }
  .home-hero-main .hero-copy {
    max-width: 520px;
    margin-top: 16px;
    font-size: 15px;
    line-height: 1.7;
  }
  .home-hero-main .hero-actions { margin-top: 0; }
  .hero-bottom {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 18px;
    margin-top: 18px;
  }
  .hero-note {
    max-width: 420px;
    color: var(--muted);
    line-height: 1.75;
    font-size: 14px;
  }
  .home-side {
    display: grid;
    grid-template-rows: 1fr auto;
    gap: 18px;
  }
  .daily-card {
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .daily-card h2 {
    margin: 0;
    font-size: clamp(26px, 3vw, 42px);
    line-height: 1.06;
    font-weight: 760;
  }
  .home-metrics {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .metric-cell {
    min-height: 116px;
    padding: 20px;
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    background: rgba(255,255,255,.04);
  }
  .metric-cell strong {
    display: block;
    font-size: clamp(30px, 3vw, 44px);
    line-height: 1;
  }
  .metric-cell span {
    display: block;
    margin-top: 12px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .masonry-card-title {
    margin: 0;
    font-size: clamp(24px, 3vw, 38px);
    line-height: 1.08;
    font-weight: 760;
  }
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 24px;
    margin: 52px 0 18px;
  }
  .section-head h2 {
    margin: 0;
    font-size: clamp(30px, 5vw, 58px);
    line-height: 1;
    font-weight: 780;
  }
  .section-head p {
    max-width: 420px;
    margin: 0;
    color: var(--muted);
    line-height: 1.7;
  }
  .editorial-layout {
    display: grid;
    grid-template-columns: minmax(0, .9fr) minmax(0, 1.1fr);
    gap: 18px;
    align-items: start;
  }
  .lead-story {
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .lead-story h3 {
    margin: 0;
    font-size: clamp(28px, 3.5vw, 48px);
    line-height: 1.04;
    font-weight: 770;
  }
  .story-list {
    display: grid;
    gap: 14px;
  }
  .story-row {
    display: grid;
    grid-template-columns: 52px minmax(0, 1fr);
    gap: 14px;
    padding: 18px;
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    background: rgba(255,255,255,.04);
  }
  .story-index {
    color: rgba(244,244,245,.34);
    font-size: 24px;
    line-height: 1;
    font-weight: 760;
  }
  .story-row h3 {
    margin: 0;
    font-size: clamp(20px, 2.2vw, 30px);
    line-height: 1.16;
  }
  .story-row p { margin: 10px 0 0; color: var(--muted); line-height: 1.7; font-size: 14px; }
  .resource-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(300px, .95fr);
    gap: 18px;
    align-items: start;
  }
  .software-board {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-top: 22px;
  }
  .software-tile {
    min-height: 0;
    padding: 18px;
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    background: rgba(255,255,255,.04);
  }
  .software-tile h3 { margin: 0; font-size: 22px; line-height: 1.18; }
  .software-tile p { margin: 10px 0 0; color: var(--muted); line-height: 1.65; font-size: 13px; }
  .column-dock {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 22px;
  }
  .column-chip {
    display: inline-flex;
    min-height: 42px;
    align-items: center;
    padding: 0 16px;
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    color: var(--muted);
    background: rgba(255,255,255,.04);
  }
  .column-chip:hover { color: var(--text); background: rgba(255,255,255,.07); }
  .home-cta {
    margin-top: 0;
    padding: clamp(24px, 4vw, 38px);
    display: grid;
    gap: 18px;
    align-items: center;
  }
  .home-cta h2 {
    margin: 0;
    font-size: clamp(28px, 4vw, 48px);
    line-height: 1.02;
  }

  @media (max-width: 920px) {
    .nav-search { display: none; }
    .nav-links { display: none; position: absolute; left: 20px; right: 20px; top: 76px; padding: 14px; border: 1px solid var(--border-soft); border-radius: 18px; background: rgba(10,12,18,0.94); backdrop-filter: blur(22px); }
    .nav-links.open { display: grid; gap: 4px; }
    .nav-toggle { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border: 1px solid var(--border-soft); border-radius: 999px; color: var(--text); background: rgba(255,255,255,0.05); }
    .content-grid { grid-template-columns: 1fr; }
    .span-3, .span-4, .span-5, .span-6, .span-7, .span-8 { grid-column: span 12; }
    .hero { padding-top: 62px; }
    .masonry-flow { column-count: 2; }
    .home-hero, .editorial-layout, .resource-layout { grid-template-columns: 1fr; }
    .hero-bottom { align-items: flex-start; flex-direction: column; }
  }
  @media (max-width: 640px) {
    .site-shell, .nav-inner { width: min(100% - 28px, 1180px); }
    .nav-inner { height: 62px; }
    .brand span:last-child { font-size: 15px; }
    .hero h1, .page-title { font-size: clamp(40px, 13vw, 64px); }
    .hero-copy, .page-copy { font-size: 16px; }
    .bento-grid { gap: 12px; padding-bottom: 48px; }
    .card-pad { padding: 20px; }
    .tall { min-height: 320px; }
    .search-panel { flex-direction: column; }
    .search-panel button { width: 100%; }
    .masonry-flow { column-count: 1; padding-top: 12px; }
    .home-hero-main h1 { font-size: clamp(34px, 10vw, 48px); }
    .home-metrics, .software-board { grid-template-columns: 1fr; }

<script>
(function() {
  var STORAGE_KEY = 'v1_theme';
  var toggle = document.getElementById('v1ThemeToggle');
  if (!toggle) return;

  function setTheme(name) {
    document.documentElement.setAttribute('data-theme', name);
    localStorage.setItem(STORAGE_KEY, name);
  }

  function getSavedTheme() {
    return localStorage.getItem(STORAGE_KEY) || 'dark';
  }

  // 初始化
  var current = getSavedTheme();
  setTheme(current);

  toggle.addEventListener('click', function() {
    var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    setTheme(next);
  });
})();
</script>
<style>
  .theme-toggle-btn {
    width: 36px; height: 36px; border: 1px solid var(--border-soft);
    border-radius: 999px; background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); margin-left: 6px; transition: color .15s, background .15s;
  }
  .theme-toggle-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  [data-theme="light"] .theme-toggle-btn:hover { background: rgba(0,0,0,0.04); }
  [data-theme="dark"] .theme-toggle-btn .icon-sun { display: block; }
  [data-theme="dark"] .theme-toggle-btn .icon-moon { display: none; }
  [data-theme="light"] .theme-toggle-btn .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle-btn .icon-moon { display: block; }
</style>
