<style>
  * { box-sizing: border-box; }
  :root {
    --page-bg: #f5f8fd;
    --card-bg: #ffffff;
    --line: #e7edf6;
    --text: #111827;
    --muted: #7b8597;
    --blue: #1977ff;
    --blue-2: #0b6bff;
    --radius-lg: 16px;
    --shadow: 0 10px 32px rgba(34,78,143,0.08);
  }
  html, body {
    margin: 0; min-height: 100%; background: var(--page-bg); color: var(--text);
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision;
  }
  body { overflow-x: hidden; }
  .site-header { height: 68px; background: rgba(255,255,255,0.96); border-bottom: 1px solid #e9eef6; display: flex; align-items: center; }
  .header-inner { width: min(1568px, calc(100% - 104px)); height: 68px; margin: 0 auto; display: flex; align-items: center; }
  .brand { width: 275px; display: flex; align-items: center; flex-shrink: 0; }
  .brand-mark { width: 35px; height: 39px; margin-right: 13px; position: relative; transform: skewX(-10deg); }
  .brand-mark::before, .brand-mark::after { content: ""; position: absolute; top: 4px; height: 31px; border-radius: 6px; background: linear-gradient(135deg,#5fa1ff 0%,#136eff 52%,#0038c7 100%); box-shadow: 0 10px 22px rgba(13,103,255,0.22); }
  .brand-mark::before { left: 1px; width: 13px; }
  .brand-mark::after { right: 0; width: 13px; }
  .brand-mark i { position: absolute; left: 13px; top: 4px; width: 12px; height: 31px; border-radius: 6px; background: linear-gradient(135deg,#0b59e9 0%,#57a3ff 100%); transform: rotate(-21deg); transform-origin: center; }
  .brand-text strong { display: block; font-size: 18px; line-height: 19px; letter-spacing: .2px; color: #172039; font-weight: 800; }
  .brand-text span { display: block; margin-top: 3px; font-size: 11px; color: #657084; font-weight: 600; letter-spacing: .2px; }
  .main-nav { margin-left: 32px; display: flex; height: 68px; align-items: center; gap: 32px; flex: 1 1 auto; white-space: nowrap; }
  .main-nav a { height: 68px; line-height: 68px; color: #16223a; text-decoration: none; font-size: 13px; font-weight: 700; position: relative; }
  .main-nav a.active { color: #096cff; }
  .main-nav a.active::after { content: ""; position: absolute; left: 50%; bottom: 0; width: 42px; height: 3px; border-radius: 2px; background: #096cff; transform: translateX(-50%); }
  .header-actions { display: flex; align-items: center; gap: 22px; flex-shrink: 0; }
  .search { width: 253px; height: 36px; border-radius: 7px; background: #f3f5f9; display: flex; align-items: center; padding: 0 6px 0 14px; }
  .search input { flex: 1; height: 100%; border: 0; outline: 0; background: transparent; font-size: 12px; font-weight: 600; color: #16223a; min-width: 0; }
  .search input::placeholder { color: #9aa3b3; }\
  .search svg { width: 17px; height: 17px; flex-shrink: 0; stroke: #111827; stroke-width: 2; cursor: pointer; }
  .btn-header { width: 62px; height: 36px; border: 1px solid #e2e7f0; background: #fff; border-radius: 7px; color: #1f2937; font-size: 12px; font-weight: 700; cursor: pointer; }
  .btn-header.primary { width: 91px; border-color: #0b73ff; background: linear-gradient(180deg,#1f82ff 0%,#096bff 100%); color: #fff; box-shadow: 0 6px 16px rgba(11,107,255,.22); }
  .theme-toggle-btn { width: 36px; height: 36px; border: 1px solid #e2e7f0; border-radius: 7px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #1f2937; margin-left: 6px; }
  [data-theme="dark"] .theme-toggle-btn .icon-sun { display: block; }
  [data-theme="dark"] .theme-toggle-btn .icon-moon { display: none; }
  [data-theme="light"] .theme-toggle-btn .icon-sun, :root .theme-toggle-btn .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle-btn .icon-moon, :root .theme-toggle-btn .icon-moon { display: block; }

  /* dark theme */
  [data-theme="dark"] { --page-bg: #0f172a; --card-bg: #1e293b; --line: #334155; --text: #e2e8f0; --muted: #94a3b8; --blue: #38bdf8; --blue-2: #38bdf8; --shadow: 0 10px 32px rgba(0,0,0,0.4); }
  [data-theme="dark"] .site-header { background: rgba(30,41,59,0.96); border-bottom-color: #334155; }
  [data-theme="dark"] .brand-text strong { color: #f1f5f9; }
  [data-theme="dark"] .brand-text span { color: #94a3b8; }
  [data-theme="dark"] .main-nav a { color: #94a3b8; }
  [data-theme="dark"] .main-nav a.active, [data-theme="dark"] .main-nav a.active::after { color: #38bdf8; background: #38bdf8; }
  [data-theme="dark"] .search { background: #0f172a; }
  [data-theme="dark"] .search input { color: #e2e8f0; }
  [data-theme="dark"] .search input::placeholder { color: #64748b; }
  [data-theme="dark"] .search svg { stroke: #e2e8f0; }
  [data-theme="dark"] .btn-header { background: #1e293b; border-color: #334155; color: #e2e8f0; }
  [data-theme="dark"] .btn-header.primary { border-color: #38bdf8; background: linear-gradient(180deg,#38bdf8 0%,#0ea5e9 100%); color: #0f172a; }
  [data-theme="dark"] .theme-toggle-btn { background: #1e293b; border-color: #334155; color: #e2e8f0; }

  .nav-toggle { display: none; width: 40px; height: 40px; border: 1px solid #e2e7f0; border-radius: 7px; background: #fff; cursor: pointer; align-items: center; justify-content: center; color: #1f2937; flex-shrink: 0; }
  [data-theme="dark"] .nav-toggle { background: #1e293b; border-color: #334155; color: #e2e8f0; }
  .nav-toggle svg { width: 20px; height: 20px; }
  .main-nav.open { display: flex; }

  @media (max-width: 1280px) { .header-inner { width: calc(100% - 48px); } .main-nav { margin-left: 28px; gap: 24px; } .search { width: 180px; } }
  @media (max-width: 860px) { .site-header { height: auto; position: sticky; top: 0; z-index: 100; }
    .header-inner { width: calc(100% - 32px); height: 56px; padding: 0; flex-wrap: nowrap; gap: 10px; }
    .brand { width: auto; flex: 1; min-width: 0; }
    .brand-text span { display: none; }
    .main-nav { display: none; position: absolute; top: 56px; left: 0; right: 0; background: var(--card-bg); border-bottom: 1px solid var(--line); padding: 8px 16px 12px; flex-direction: column; gap: 2px; height: auto; margin: 0; box-shadow: 0 8px 24px rgba(0,0,0,.08); z-index: 99; }
    .main-nav.open { display: flex; }
    .main-nav a { height: 42px; line-height: 42px; font-size: 14px; font-weight: 600; }
    .main-nav a.active::after { display: none; }
    .main-nav a.active { background: rgba(9,108,255,.06); border-radius: 8px; padding: 0 12px; margin: 0 -12px; }
    .search { flex: 1; width: auto; min-width: 0; }
    .btn-header { display: none; }
    .theme-toggle-btn { flex-shrink: 0; }
    .nav-toggle { display: flex; }
  }
</style>

<nav class="site-header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark"><i></i></div>
      <div class="brand-text">
        <strong>[--site_name--]</strong>
        <span>科技资讯与软件精选平台</span>
      </div>
    </div>
    <nav class="main-nav" id="v1NavLinks">
      <a class="active" href="/">首页</a>
      [--loop:columns(pid=0)--]
      <a href="[--url--]">[--name--]</a>
      [--/loop:columns--]
      <a href="/article-list">文章</a>
      <a href="/software-list">软件</a>
      <a href="/search">搜索</a>
    </nav>
    <div class="header-actions">
      <form class="search" action="/search" method="get" onsubmit="return this.q.value.trim()!==''">
        <input type="search" name="q" placeholder="搜索文章、软件…" value="" autocomplete="off">
        <button type="submit" aria-label="搜索" style="border:0;background:none;cursor:pointer;padding:0;display:flex">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7"></circle><path d="M16.6 16.6 21 21"></path></svg>
        </button>
      </form>
      <button class="btn-header">登录</button>
      <button class="btn-header primary">注册</button>
      <button class="theme-toggle-btn" id="v1ThemeToggle" type="button" aria-label="切换主题" title="切换深色/浅色">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="nav-toggle" id="v1NavToggle" type="button" aria-label="菜单" onclick="document.getElementById('v1NavLinks').classList.toggle('open')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </div>
</nav>

<script>
(function(){
  var STORAGE_KEY='v1_theme';
  var toggle=document.getElementById('v1ThemeToggle');
  if(!toggle)return;
  function setTheme(name){document.documentElement.setAttribute('data-theme',name);localStorage.setItem(STORAGE_KEY,name);}
  var current=localStorage.getItem(STORAGE_KEY)||'light';
  setTheme(current);
  toggle.addEventListener('click',function(){
    var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    setTheme(next);
  });
  // 移动端点击菜单外部关闭
  document.addEventListener('click',function(e){
    var nav=document.getElementById('v1NavLinks');
    var toggle=document.getElementById('v1NavToggle');
    if(nav&&nav.classList.contains('open')&&!nav.contains(e.target)&&e.target!==toggle&&!toggle.contains(e.target)){nav.classList.remove('open');}
  });
})();
</script>
