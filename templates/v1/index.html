<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYCMS - 首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; line-height: 1.6; }
        .topbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: relative; }
        .topbar .logo { font-size: 20px; font-weight: 700; color: #333; }
        .topbar nav { display: flex; align-items: center; gap: 8px; }
        .topbar nav a { margin-left: 16px; color: #666; text-decoration: none; font-size: 14px; }
        .topbar nav a:hover { color: #333; }

        /* ── 搜索 ── */
        .search-wrap { position: relative; margin-left: 8px; }
        .search-icon { width: 36px; height: 36px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: #666; transition: background .15s; }
        .search-icon:hover { background: #f0f0f0; color: #333; }
        .search-box { position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 0; overflow: hidden; transition: width .25s ease; background: #fff; border-radius: 8px; z-index: 100; }
        .search-box.open { width: 360px; border: 1px solid #ddd; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
        .search-box input { width: 100%; padding: 10px 44px 10px 14px; border: none; font-size: 14px; outline: none; background: transparent; color: #333; }
        .search-box .search-close { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border: none; background: none; cursor: pointer; color: #999; font-size: 18px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .search-box .search-close:hover { background: #f0f0f0; color: #333; }
        .search-results { position: absolute; right: 0; top: 100%; width: 360px; background: #fff; border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; box-shadow: 0 4px 20px rgba(0,0,0,.1); display: none; z-index: 99; max-height: 360px; overflow-y: auto; }
        .search-results.open { display: block; }
        .search-results .sr-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; text-decoration: none; color: #333; transition: background .1s; }
        .search-results .sr-item:hover { background: #f8f8ff; }
        .search-results .sr-item .sr-type { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #f0f0f0; color: #888; white-space: nowrap; }
        .search-results .sr-item .sr-type.article { background: #e8e8ff; color: #5555cc; }
        .search-results .sr-item .sr-type.software { background: #e8ffe8; color: #338833; }
        .search-results .sr-item .sr-info { flex: 1; min-width: 0; }
        .search-results .sr-item .sr-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .search-results .sr-item .sr-sub { font-size: 11px; color: #999; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .search-results .sr-empty { text-align: center; padding: 24px; color: #999; font-size: 13px; }
        .search-results .sr-more { text-align: center; padding: 10px; }
        .search-results .sr-more a { color: #5555cc; font-size: 12px; text-decoration: none; }

        .hero { text-align: center; padding: 80px 24px 60px; background: #fff; }
        .hero h1 { font-size: 40px; font-weight: 700; margin-bottom: 12px; }
        .hero p { color: #888; font-size: 16px; max-width: 480px; margin: 0 auto 24px; }
        .hero .btn { display: inline-block; padding: 10px 28px; background: #333; color: #fff; border-radius: 6px; text-decoration: none; font-size: 14px; margin: 0 6px; }
        .hero .btn-outline { background: #fff; color: #333; border: 1px solid #ccc; }
        .section { max-width: 1080px; margin: 0 auto; padding: 0 24px 40px; }
        .section-title { font-size: 20px; font-weight: 700; margin: 40px 0 16px; display: flex; align-items: center; gap: 8px; }
        .section-title .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: box-shadow .2s; }
        .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
        .card .meta { display: flex; gap: 12px; font-size: 12px; color: #999; margin-bottom: 6px; flex-wrap: wrap; }
        .card .meta span { background: #f0f0f0; padding: 2px 8px; border-radius: 4px; }
        .card .meta .cat { background: #e8e8ff; color: #5555cc; }
        .card h3 { font-size: 16px; margin-bottom: 8px; }
        .card h3 a { color: #333; text-decoration: none; }
        .card h3 a:hover { color: #5555cc; }
        .card p { color: #888; font-size: 13px; line-height: 1.5; }
        .card .ver { font-size: 12px; color: #5555cc; font-weight: 600; }
        .footer { text-align: center; padding: 32px; color: #aaa; font-size: 12px; }
        .badge { position: absolute; top: 12px; right: 12px; background: #333; color: #fff; padding: 2px 10px; border-radius: 20px; font-size: 11px; z-index: 1; }
        .empty { text-align: center; padding: 40px; color: #ccc; font-size: 14px; }
        .loading { text-align: center; padding: 40px; color: #999; }
        @media (max-width: 768px) {
            .cards { grid-template-columns: 1fr; } .hero h1 { font-size: 28px; }
            .search-box.open { width: calc(100vw - 100px); }
            .search-results.open { width: calc(100vw - 100px); }
        }
    </style>
</head>
<body>

<div style="position:relative">
    <span class="badge">V1 经典版</span>
    <div class="topbar">
        <div class="logo">MYCMS</div>
        <nav>
            <a href="/">首页</a>
            <a href="/list">文章</a>
            <a href="/favorites">收藏</a>
            <a href="/login">登录</a>
            <!-- 搜索入口 -->
            <span class="search-wrap" id="search-wrap">
                <button class="search-icon" id="search-btn" title="搜索">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:18px;height:18px">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                </button>
                <div class="search-box" id="search-box">
                    <input type="text" id="search-input" placeholder="搜索文章、软件…" autocomplete="off">
                    <button class="search-close" id="search-close">&times;</button>
                </div>
            </span>
        </nav>
    </div>

    <!-- 搜索结果下拉 -->
    <div class="search-results" id="search-results"></div>

    <div class="hero">
        <h1>欢迎来到 MYCMS</h1>
        <p>简洁高效的内容管理系统，轻松管理文章、软件资源与用户收藏。</p>
        <a href="/list" class="btn">浏览内容</a>
        <a href="/login" class="btn btn-outline">立即登录</a>
    </div>

    <div class="section">
        <div class="section-title"><span class="dot"></span>最新文章</div>
        <div class="cards" id="article-list"><div class="loading">加载中…</div></div>
    </div>

    <div class="section">
        <div class="section-title"><span class="dot" style="background:#5555cc"></span>推荐软件</div>
        <div class="cards" id="software-list"><div class="loading">加载中…</div></div>
    </div>

    <div class="footer">&copy; 2026 MYCMS. All rights reserved.</div>
</div>

<script>
(function() {
    var bp = (window.__BASE_PATH__ || '').replace(/\/$/, '');
    var api = bp + '/api/home.php';
    var searchApi = bp + '/search/api/list';

    function formatDate(d) {
        if (!d) return '-';
        var t = d.replace(' ', 'T') + 'Z';
        var date = new Date(t);
        if (isNaN(date.getTime())) return d.substring(0, 10);
        var now = new Date();
        var diff = now - date;
        if (diff < 86400000) return '今天';
        if (diff < 172800000) return '昨天';
        if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
        return d.substring(0, 10);
    }

    function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // ── 首页数据 ──
    fetch(api).then(function(r) { return r.json(); }).then(function(res) {
        if (res.code !== 0) return;
        var data = res.data;
        var aList = document.getElementById('article-list');
        var articles = data.articles || [];
        if (articles.length === 0) {
            aList.innerHTML = '<div class="empty">暂无文章</div>';
        } else {
            var ah = '';
            articles.forEach(function(a) {
                ah += '<div class="card"><div class="meta">';
                if (a.category) ah += '<span class="cat">' + escapeHtml(a.category) + '</span>';
                ah += '<span>' + formatDate(a.published_at || a.updated_at || a.created_at) + '</span>';
                if (a.view_count) ah += '<span>' + a.view_count + ' 次阅读</span>';
                ah += '</div><h3><a href="' + bp + '/article/p/' + a.id + '">' + escapeHtml(a.title) + '</a></h3>';
                ah += '<p>' + escapeHtml(a.content || '') + '</p></div>';
            });
            aList.innerHTML = ah;
        }
        var sList = document.getElementById('software-list');
        var software = data.software || [];
        if (software.length === 0) {
            sList.innerHTML = '<div class="empty">暂无软件</div>';
        } else {
            var sh = '';
            software.forEach(function(s) {
                sh += '<div class="card"><div class="meta">';
                if (s.category_name) sh += '<span class="cat">' + escapeHtml(s.category_name) + '</span>';
                if (s.version) sh += '<span class="ver">' + escapeHtml(s.version) + '</span>';
                if (s.file_size) sh += '<span>' + escapeHtml(s.file_size) + ' MB</span>';
                sh += '</div><h3>' + escapeHtml(s.name) + '</h3>';
                sh += '<p>' + escapeHtml((s.description || '').substring(0, 120)) + '</p>';
                if (s.os_support && s.os_support.length) {
                    sh += '<div class="meta" style="margin-top:8px">';
                    s.os_support.forEach(function(os) { sh += '<span>' + escapeHtml(os) + '</span>'; });
                    sh += '</div>';
                }
                sh += '</div>';
            });
            sList.innerHTML = sh;
        }
    }).catch(function() {
        document.getElementById('article-list').innerHTML = '<div class="empty">加载失败</div>';
        document.getElementById('software-list').innerHTML = '<div class="empty">加载失败</div>';
    });

    // ── 搜索 ──
    var searchBtn = document.getElementById('search-btn');
    var searchBox = document.getElementById('search-box');
    var searchInput = document.getElementById('search-input');
    var searchClose = document.getElementById('search-close');
    var searchResults = document.getElementById('search-results');
    var searchTimer = null;

    searchBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (searchBox.classList.contains('open')) {
            closeSearch();
        } else {
            searchBox.classList.add('open');
            searchResults.classList.add('open');
            setTimeout(function() { searchInput.focus(); }, 200);
        }
    });

    searchClose.addEventListener('click', function(e) {
        e.stopPropagation();
        closeSearch();
    });

    function closeSearch() {
        searchBox.classList.remove('open');
        searchResults.classList.remove('open');
        searchInput.value = '';
        searchResults.innerHTML = '';
    }

    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimer);
        var kw = searchInput.value.trim();
        if (!kw) { searchResults.innerHTML = ''; return; }
        if (kw.length < 2) { searchResults.innerHTML = '<div class="sr-empty">请输入至少2个字符</div>'; return; }
        searchTimer = setTimeout(function() { doSearch(kw); }, 300);
    });

    function doSearch(kw) {
        searchResults.innerHTML = '<div class="sr-empty">搜索中…</div>';
        fetch(searchApi + '?keyword=' + encodeURIComponent(kw) + '&page_size=6')
            .then(function(r) { return r.json(); })
            .then(function(res) {
                if (res.code !== 0) { searchResults.innerHTML = '<div class="sr-empty">搜索出错</div>'; return; }
                var list = res.data.list || [];
                if (list.length === 0) {
                    searchResults.innerHTML = '<div class="sr-empty">未找到「' + escapeHtml(kw) + '」相关结果</div>';
                    return;
                }
                var h = '';
                list.forEach(function(item) {
                    var typeLabel = item.type === 'article' ? '文章' : '软件';
                    var typeClass = item.type;
                    var url = bp + (item.url || '/');
                    var title = item.title || '无标题';
                    var subtitle = item.subtitle || '';
                    h += '<a class="sr-item" href="' + url + '">';
                    h += '<span class="sr-type ' + typeClass + '">' + typeLabel + '</span>';
                    h += '<span class="sr-info"><div class="sr-title">' + escapeHtml(title) + '</div>';
                    h += '<div class="sr-sub">' + escapeHtml(subtitle) + '</div></span>';
                    h += '</a>';
                });
                h += '<div class="sr-more"><a href="' + bp + '/search?keyword=' + encodeURIComponent(kw) + '">查看更多结果 →</a></div>';
                searchResults.innerHTML = h;
            })
            .catch(function() { searchResults.innerHTML = '<div class="sr-empty">网络错误</div>'; });
    }

    // 点击空白区域关闭搜索
    document.addEventListener('click', function(e) {
        if (!document.getElementById('search-wrap').contains(e.target)) {
            if (searchBox.classList.contains('open') || searchResults.classList.contains('open')) {
                closeSearch();
            }
        }
    });

    // 按 ESC 关闭
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSearch();
    });
})();
</script>

</body>
</html>
