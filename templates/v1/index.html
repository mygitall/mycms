<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYCMS - 首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; line-height: 1.6; }
        .topbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: relative; }
        .topbar .logo { font-size: 20px; font-weight: 700; color: #333; }
        .topbar nav { display: flex; align-items: center; gap: 8px; }
        .topbar nav a { margin-left: 16px; color: #666; text-decoration: none; font-size: 14px; }
        .topbar nav a:hover { color: #333; }

        /* ── 搜索 ── */
        .search-wrap { position: relative; margin-left: 8px; }
        .search-icon { width: 36px; height: 36px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: #666; transition: background .15s; }
        .search-icon:hover { background: #f0f0f0; color: #333; }
        .search-box { position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 0; overflow: hidden; transition: width .25s ease; background: #fff; border-radius: 8px; z-index: 100; }
        .search-box.open { width: 360px; border: 1px solid #ddd; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
        .search-box input { width: 100%; padding: 10px 44px 10px 14px; border: none; font-size: 14px; outline: none; background: transparent; color: #333; }
        .search-box .search-close { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border: none; background: none; cursor: pointer; color: #999; font-size: 18px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .search-box .search-close:hover { background: #f0f0f0; color: #333; }
        .search-results { position: absolute; right: 0; top: 100%; width: 360px; background: #fff; border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; box-shadow: 0 4px 20px rgba(0,0,0,.1); display: none; z-index: 99; max-height: 360px; overflow-y: auto; }
        .search-results.open { display: block; }
        .search-results .sr-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; text-decoration: none; color: #333; transition: background .1s; }
        .search-results .sr-item:hover { background: #f8f8ff; }
        .search-results .sr-item .sr-type { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #f0f0f0; color: #888; white-space: nowrap; }
        .search-results .sr-item .sr-type.article { background: #e8e8ff; color: #5555cc; }
        .search-results .sr-item .sr-type.software { background: #e8ffe8; color: #338833; }
        .search-results .sr-item .sr-info { flex: 1; min-width: 0; }
        .search-results .sr-item .sr-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .search-results .sr-item .sr-sub { font-size: 11px; color: #999; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .search-results .sr-empty { text-align: center; padding: 24px; color: #999; font-size: 13px; }
        .search-results .sr-more { text-align: center; padding: 10px; }
        .search-results .sr-more a { color: #5555cc; font-size: 12px; text-decoration: none; }

        .hero { text-align: center; padding: 80px 24px 60px; background: #fff; }
        .hero h1 { font-size: 40px; font-weight: 700; margin-bottom: 12px; }
        .hero p { color: #888; font-size: 16px; max-width: 480px; margin: 0 auto 24px; }
        .hero .btn { display: inline-block; padding: 10px 28px; background: #333; color: #fff; border-radius: 6px; text-decoration: none; font-size: 14px; margin: 0 6px; }
        .hero .btn-outline { background: #fff; color: #333; border: 1px solid #ccc; }
        .section { max-width: 1080px; margin: 0 auto; padding: 0 24px 40px; }
        .section-title { font-size: 20px; font-weight: 700; margin: 40px 0 16px; display: flex; align-items: center; gap: 8px; }
        .section-title .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: box-shadow .2s; }
        .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
        .card .meta { display: flex; gap: 12px; font-size: 12px; color: #999; margin-bottom: 6px; flex-wrap: wrap; }
        .card .meta span { background: #f0f0f0; padding: 2px 8px; border-radius: 4px; }
        .card .meta .cat { background: #e8e8ff; color: #5555cc; }
        .card h3 { font-size: 16px; margin-bottom: 8px; }
        .card h3 a { color: #333; text-decoration: none; }
        .card h3 a:hover { color: #5555cc; }
        .card p { color: #888; font-size: 13px; line-height: 1.5; }
        .card .ver { font-size: 12px; color: #5555cc; font-weight: 600; }
        .footer { text-align: center; padding: 32px; color: #aaa; font-size: 12px; }
        .badge { position: absolute; top: 12px; right: 12px; background: #333; color: #fff; padding: 2px 10px; border-radius: 20px; font-size: 11px; z-index: 1; }
        .empty { text-align: center; padding: 40px; color: #ccc; font-size: 14px; }
        .loading { text-align: center; padding: 40px; color: #999; }
        /* ── 登录弹窗 ── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 14px; padding: 32px 28px; width: 380px; max-width: 90vw; box-shadow: 0 8px 40px rgba(0,0,0,.15); position: relative; animation: modalIn .2s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }
        .modal-close { position: absolute; top: 12px; right: 14px; width: 32px; height: 32px; border: none; background: none; cursor: pointer; color: #999; font-size: 20px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: #f0f0f0; color: #333; }
        .modal h2 { font-size: 18px; margin-bottom: 6px; }
        .modal .sub { font-size: 12px; color: #999; margin-bottom: 20px; }
        .modal .form-group { margin-bottom: 14px; }
        .modal label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #555; }
        .modal input[type="text"], .modal input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: border-color .15s; }
        .modal input:focus { border-color: #5555cc; }
        .modal .btn-login { width: 100%; padding: 11px; background: #333; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
        .modal .btn-login:hover { background: #555; }
        .modal .btn-login:disabled { opacity: .6; cursor: not-allowed; }
        .modal .err { color: #e53e3e; font-size: 12px; margin-top: 8px; text-align: center; display: none; }
        .nav-user { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #5555cc; cursor: default; position: relative; }
        .nav-user .logout-link { color: #999; cursor: pointer; font-size: 12px; margin-left: 4px; }
        .nav-user .logout-link:hover { color: #e53e3e; }
        .nav-user .profile-trigger { cursor: pointer; font-weight: 600; padding: 4px 8px; border-radius: 4px; display: flex; align-items: center; gap: 4px; }
        .nav-user .profile-trigger:hover { background: #f0f0ff; }
        .nav-user .profile-trigger svg { width: 12px; height: 12px; }

        /* 个人中心下拉 */
        .profile-dropdown { display: none; position: absolute; top: 100%; right: 0; margin-top: 8px; width: 320px; background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,.12); z-index: 150; overflow: hidden; }
        .profile-dropdown.show { display: block; }
        .profile-dropdown .pd-header { padding: 16px 20px; background: #f8f8ff; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
        .profile-dropdown .pd-avatar { width: 40px; height: 40px; border-radius: 50%; background: #5555cc; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
        .profile-dropdown .pd-info { flex: 1; min-width: 0; }
        .profile-dropdown .pd-name { font-size: 14px; font-weight: 600; color: #333; }
        .profile-dropdown .pd-id { font-size: 11px; color: #999; }
        .profile-dropdown .pd-body { max-height: 260px; overflow-y: auto; }
        .profile-dropdown .pd-section-title { padding: 10px 20px 4px; font-size: 11px; font-weight: 700; color: #999; letter-spacing: 0.5px; }
        .profile-dropdown .pd-fav-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px; border-bottom: 1px solid #f5f5f5; text-decoration: none; color: #333; font-size: 13px; transition: background .1s; }
        .profile-dropdown .pd-fav-item:hover { background: #f8f8ff; }
        .profile-dropdown .pd-fav-item .fav-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .profile-dropdown .pd-fav-item .fav-cat { font-size: 10px; color: #999; background: #f0f0f0; padding: 1px 6px; border-radius: 4px; margin-left: 8px; }
        .profile-dropdown .pd-empty { text-align: center; padding: 20px; color: #ccc; font-size: 12px; }
        .profile-dropdown .pd-footer { padding: 10px 20px; border-top: 1px solid #eee; text-align: center; }
        .profile-dropdown .pd-footer a { color: #5555cc; font-size: 12px; text-decoration: none; }
        @media (max-width: 768px) {
            .cards { grid-template-columns: 1fr; } .hero h1 { font-size: 28px; }
            .search-box.open { width: calc(100vw - 100px); }
            .search-results.open { width: calc(100vw - 100px); }
        }
    </style>
</head>
<body>

<div style="position:relative">
    <span class="badge">V1 经典版</span>
    <div class="topbar">
        <div class="logo">MYCMS</div>
        <nav>
            <a href="/">首页</a>
            <a href="/list">文章</a>
            <a href="/favorites">收藏</a>
            <a href="javascript:void(0)" id="nav-login-link" onclick="openLoginModal()">登录</a>
            <span class="nav-user" id="nav-user-info" style="display:none">
              <span id="nav-username"></span>
              <span class="profile-trigger" id="profile-trigger" onclick="toggleProfileDropdown()">
                个人中心
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
              </span>
              <span class="logout-link" onclick="doLogout()">退出</span>
              <div class="profile-dropdown" id="profile-dropdown">
                <div class="pd-header">
                  <div class="pd-avatar" id="pd-avatar">A</div>
                  <div class="pd-info">
                    <div class="pd-name" id="pd-name">--</div>
                    <div class="pd-id" id="pd-uid">ID: --</div>
                  </div>
                </div>
                <div class="pd-section-title">我的收藏</div>
                <div class="pd-body" id="pd-fav-list"><div class="pd-empty">加载中…</div></div>
                <div class="pd-footer"><a href="/favorites">查看全部收藏 →</a></div>
              </div>
            </span>
            <!-- 搜索入口 -->
            <span class="search-wrap" id="search-wrap">
                <button class="search-icon" id="search-btn" title="搜索">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:18px;height:18px">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                </button>
                <div class="search-box" id="search-box">
                    <input type="text" id="search-input" placeholder="搜索文章、软件…" autocomplete="off">
                    <button class="search-close" id="search-close">&times;</button>
                </div>
            </span>
        </nav>
    </div>

    <!-- 搜索结果下拉 -->
    <div class="search-results" id="search-results"></div>

    <!-- 登录弹窗 -->
    <div class="modal-overlay" id="login-modal">
      <div class="modal">
        <button class="modal-close" onclick="closeLoginModal()">&times;</button>
        <h2>用户登录</h2>
        <p class="sub">登录后可管理收藏和个性化内容</p>
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="login-username" placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <div class="err" id="login-error"></div>
        <button class="btn-login" id="login-submit-btn" onclick="doLogin()">登 录</button>
      </div>
    </div>

    <div class="hero">
        <h1>欢迎来到 MYCMS</h1>
        <p>简洁高效的内容管理系统，轻松管理文章、软件资源与用户收藏。</p>
        <a href="/list" class="btn">浏览内容</a>
        <a href="javascript:void(0)" class="btn btn-outline" onclick="openLoginModal()">立即登录</a>
    </div>

    <div class="section">
        <div class="section-title"><span class="dot"></span>最新文章</div>
        <div class="cards" id="article-list"><div class="loading">加载中…</div></div>
    </div>

    <div class="section">
        <div class="section-title"><span class="dot" style="background:#5555cc"></span>推荐软件</div>
        <div class="cards" id="software-list"><div class="loading">加载中…</div></div>
    </div>

    <div class="footer">&copy; 2026 MYCMS. All rights reserved.</div>
</div>

<script>
(function() {
    var bp = (window.__BASE_PATH__ || '').replace(/\/$/, '');
    var api = bp + '/api/home.php';
    var searchApi = bp + '/search/api/list';

    function formatDate(d) {
        if (!d) return '-';
        var t = d.replace(' ', 'T') + 'Z';
        var date = new Date(t);
        if (isNaN(date.getTime())) return d.substring(0, 10);
        var now = new Date();
        var diff = now - date;
        if (diff < 86400000) return '今天';
        if (diff < 172800000) return '昨天';
        if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
        return d.substring(0, 10);
    }

    function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // ── 首页数据 ──
    fetch(api).then(function(r) { return r.json(); }).then(function(res) {
        if (res.code !== 0) return;
        var data = res.data;
        var aList = document.getElementById('article-list');
        var articles = data.articles || [];
        if (articles.length === 0) {
            aList.innerHTML = '<div class="empty">暂无文章</div>';
        } else {
            var ah = '';
            articles.forEach(function(a) {
                ah += '<div class="card"><div class="meta">';
                if (a.category) ah += '<span class="cat">' + escapeHtml(a.category) + '</span>';
                ah += '<span>' + formatDate(a.published_at || a.updated_at || a.created_at) + '</span>';
                if (a.view_count) ah += '<span>' + a.view_count + ' 次阅读</span>';
                ah += '</div><h3><a href="' + bp + '/article/p/' + a.id + '">' + escapeHtml(a.title) + '</a></h3>';
                ah += '<p>' + escapeHtml(a.content || '') + '</p></div>';
            });
            aList.innerHTML = ah;
        }
        var sList = document.getElementById('software-list');
        var software = data.software || [];
        if (software.length === 0) {
            sList.innerHTML = '<div class="empty">暂无软件</div>';
        } else {
            var sh = '';
            software.forEach(function(s) {
                sh += '<div class="card"><div class="meta">';
                if (s.category_name) sh += '<span class="cat">' + escapeHtml(s.category_name) + '</span>';
                if (s.version) sh += '<span class="ver">' + escapeHtml(s.version) + '</span>';
                if (s.file_size) sh += '<span>' + escapeHtml(s.file_size) + ' MB</span>';
                sh += '</div><h3>' + escapeHtml(s.name) + '</h3>';
                sh += '<p>' + escapeHtml((s.description || '').substring(0, 120)) + '</p>';
                if (s.os_support && s.os_support.length) {
                    sh += '<div class="meta" style="margin-top:8px">';
                    s.os_support.forEach(function(os) { sh += '<span>' + escapeHtml(os) + '</span>'; });
                    sh += '</div>';
                }
                sh += '</div>';
            });
            sList.innerHTML = sh;
        }
    }).catch(function() {
        document.getElementById('article-list').innerHTML = '<div class="empty">加载失败</div>';
        document.getElementById('software-list').innerHTML = '<div class="empty">加载失败</div>';
    });

    // ── 搜索 ──
    var searchBtn = document.getElementById('search-btn');
    var searchBox = document.getElementById('search-box');
    var searchInput = document.getElementById('search-input');
    var searchClose = document.getElementById('search-close');
    var searchResults = document.getElementById('search-results');
    var searchTimer = null;

    searchBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (searchBox.classList.contains('open')) {
            closeSearch();
        } else {
            searchBox.classList.add('open');
            searchResults.classList.add('open');
            setTimeout(function() { searchInput.focus(); }, 200);
        }
    });

    searchClose.addEventListener('click', function(e) {
        e.stopPropagation();
        closeSearch();
    });

    function closeSearch() {
        searchBox.classList.remove('open');
        searchResults.classList.remove('open');
        searchInput.value = '';
        searchResults.innerHTML = '';
    }

    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimer);
        var kw = searchInput.value.trim();
        if (!kw) { searchResults.innerHTML = ''; return; }
        if (kw.length < 2) { searchResults.innerHTML = '<div class="sr-empty">请输入至少2个字符</div>'; return; }
        searchTimer = setTimeout(function() { doSearch(kw); }, 300);
    });

    function doSearch(kw) {
        searchResults.innerHTML = '<div class="sr-empty">搜索中…</div>';
        fetch(searchApi + '?keyword=' + encodeURIComponent(kw) + '&page_size=6')
            .then(function(r) { return r.json(); })
            .then(function(res) {
                if (res.code !== 0) { searchResults.innerHTML = '<div class="sr-empty">搜索出错</div>'; return; }
                var list = res.data.list || [];
                if (list.length === 0) {
                    searchResults.innerHTML = '<div class="sr-empty">未找到「' + escapeHtml(kw) + '」相关结果</div>';
                    return;
                }
                var h = '';
                list.forEach(function(item) {
                    var typeLabel = item.type === 'article' ? '文章' : '软件';
                    var typeClass = item.type;
                    var url = bp + (item.url || '/');
                    var title = item.title || '无标题';
                    var subtitle = item.subtitle || '';
                    h += '<a class="sr-item" href="' + url + '">';
                    h += '<span class="sr-type ' + typeClass + '">' + typeLabel + '</span>';
                    h += '<span class="sr-info"><div class="sr-title">' + escapeHtml(title) + '</div>';
                    h += '<div class="sr-sub">' + escapeHtml(subtitle) + '</div></span>';
                    h += '</a>';
                });
                h += '<div class="sr-more"><a href="' + bp + '/search?keyword=' + encodeURIComponent(kw) + '">查看更多结果 →</a></div>';
                searchResults.innerHTML = h;
            })
            .catch(function() { searchResults.innerHTML = '<div class="sr-empty">网络错误</div>'; });
    }

    // 点击空白区域关闭搜索
    document.addEventListener('click', function(e) {
        if (!document.getElementById('search-wrap').contains(e.target)) {
            if (searchBox.classList.contains('open') || searchResults.classList.contains('open')) {
                closeSearch();
            }
        }
    });

    // 按 ESC 关闭
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { closeSearch(); closeLoginModal(); }
    });

    // ── 登录 ──
    var loginApi = bp + '/api/login.php';

    window.openLoginModal = function() {
      document.getElementById('login-modal').classList.add('show');
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('login-error').textContent = '';
      setTimeout(function() { document.getElementById('login-username').focus(); }, 150);
    };

    window.closeLoginModal = function() {
      document.getElementById('login-modal').classList.remove('show');
    };

    document.getElementById('login-modal').addEventListener('click', function(e) {
      if (e.target === this) closeLoginModal();
    });

    // Enter 键登录
    document.getElementById('login-password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('login-username').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('login-password').focus();
    });

    window.doLogin = function() {
      var username = document.getElementById('login-username').value.trim();
      var password = document.getElementById('login-password').value;
      var errEl = document.getElementById('login-error');
      var btn = document.getElementById('login-submit-btn');

      if (!username) { showLoginErr('请输入用户名'); return; }
      if (!password) { showLoginErr('请输入密码'); return; }

      btn.disabled = true; btn.textContent = '登录中…';
      errEl.style.display = 'none';

      fetch(loginApi, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      }).then(function(r) { return r.json(); })
        .then(function(res) {
          btn.disabled = false; btn.textContent = '登 录';
          if (res.code === 0) {
            var data = res.data;
            localStorage.setItem('cms_token', data.token);
            localStorage.setItem('cms_username', data.username);
            localStorage.setItem('cms_uid', data.user_id || '');
            closeLoginModal();
            updateLoginUI(data.username, data.user_id);
          } else {
            showLoginErr(res.msg || '登录失败');
          }
        }).catch(function() {
          btn.disabled = false; btn.textContent = '登 录';
          showLoginErr('网络错误，请稍后重试');
        });
    };

    function showLoginErr(msg) {
      var el = document.getElementById('login-error');
      el.textContent = msg; el.style.display = 'block';
    }

    window.doLogout = function() {
      localStorage.removeItem('cms_token');
      localStorage.removeItem('cms_username');
      localStorage.removeItem('cms_uid');
      updateLoginUI(null, null);
    };

    function updateLoginUI(username, uid) {
      var link = document.getElementById('nav-login-link');
      var info = document.getElementById('nav-user-info');
      var heroBtn = document.querySelector('.hero .btn-outline');
      if (username) {
        link.style.display = 'none';
        info.style.display = 'flex';
        document.getElementById('nav-username').textContent = username;
        document.getElementById('pd-name').textContent = username;
        document.getElementById('pd-uid').textContent = 'ID: ' + (uid || '-');
        document.getElementById('pd-avatar').textContent = (username || 'A')[0].toUpperCase();
        if (heroBtn) { heroBtn.style.display = 'none'; }
      } else {
        link.style.display = '';
        info.style.display = 'none';
        if (heroBtn) { heroBtn.style.display = ''; }
      }
    }

    // ── 个人中心下拉 ──
    var favApi = bp + '/article/api/favorites.php';
    var favLoaded = false;

    window.toggleProfileDropdown = function() {
      var dd = document.getElementById('profile-dropdown');
      var isOpen = dd.classList.contains('show');
      if (isOpen) {
        dd.classList.remove('show');
      } else {
        dd.classList.add('show');
        if (!favLoaded) loadProfileFavorites();
      }
    };

    function loadProfileFavorites() {
      var token = localStorage.getItem('cms_token') || '';
      var listEl = document.getElementById('pd-fav-list');
      if (!listEl) return;
      listEl.innerHTML = '<div class="pd-empty">加载中…</div>';

      fetch(favApi, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ _token: token, page: 1, page_size: 10 })
      }).then(function(r) { return r.json(); })
        .then(function(res) {
          favLoaded = true;
          if (res.code !== 0) {
            listEl.innerHTML = '<div class="pd-empty">加载失败</div>';
            return;
          }
          var list = res.data.list || [];
          if (list.length === 0) {
            listEl.innerHTML = '<div class="pd-empty">暂无收藏</div>';
            return;
          }
          var h = '';
          list.forEach(function(item) {
            h += '<a class="pd-fav-item" href="' + bp + '/article/p/' + item.id + '">';
            h += '<span class="fav-title">' + escapeHtml(item.title) + '</span>';
            if (item.category) h += '<span class="fav-cat">' + escapeHtml(item.category) + '</span>';
            h += '</a>';
          });
          listEl.innerHTML = h;
        }).catch(function() {
          listEl.innerHTML = '<div class="pd-empty">网络错误</div>';
        });
    }

    // 点击空白关闭下拉
    document.addEventListener('click', function(e) {
      var dd = document.getElementById('profile-dropdown');
      var trigger = document.getElementById('profile-trigger');
      if (dd && dd.classList.contains('show') && !trigger.contains(e.target) && !dd.contains(e.target)) {
        dd.classList.remove('show');
      }
    });

    // 页面加载时检查已登录状态
    var savedUser = localStorage.getItem('cms_username');
    var savedUid = localStorage.getItem('cms_uid');
    if (savedUser) updateLoginUI(savedUser, savedUid);
})();
</script>

</body>
</html>
