<!DOCTYPE html>

  <link rel="stylesheet" href="css/style.css">
  <!-- Noto Serif/Sans SC 等字体请确保系统已安装，或替换为系统字体 -->
  <!-- 已移除 Google Fonts CDN 依赖，保证内网/离线环境下正常运行 -->
  <script>
    // 禁止双指缩放页面（兼容 iOS、Android、鸿蒙等所有移动端浏览器）
    document.addEventListener('touchstart', function (e) {
      if (e.touches.length > 1) {
        e.preventDefault();
      }
    }, { passive: false });

    var lastTouchEnd = 0;
    document.addEventListener('touchend', function (e) {
      var now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('gesturestart', function (e) {
      e.preventDefault();
    });
    document.addEventListener('gesturechange', function (e) {
      e.preventDefault();
    });
    document.addEventListener('gestureend', function (e) {
      e.preventDefault();
    });

    document.addEventListener('keydown', function (e) {
      if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '0')) {
        e.preventDefault();
      }
    });

    document.addEventListener('wheel', function (e) {
      if (e.ctrlKey) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>
</head>
<body>

  <!-- 顶部导航 -->
  <header class="site-header" id="siteHeader">

    <button class="mobile-tab-btn" data-tab="design">

    </button>

      <span>旅行</span>

  </div>

  <!-- 搜索历史弹层 -->
  <div class="search-overlay" id="searchOverlay">
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索文章标题或关键词...">
      <button class="search-close" id="searchClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="search-results" id="searchResults">
      <div class="search-history" id="searchHistory">
        <div class="search-history-header">
          <span>搜索历史</span>
          <button class="search-history-clear" id="clearSearchHistory">清除</button>
        </div>
        <div class="search-history-list" id="searchHistoryList"></div>
      </div>
    </div>
  </div>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="main-inner">

    <!-- 精选文章 Banner -->
    <div class="hero-banner" id="heroBanner">
      <div class="container">
        <div class="hero-banner-inner" id="heroBannerInner">
          <!-- Banner 由 JS 动态渲染 -->
        </div>
      </div>
    </div>

    <!-- 文章列表 -->
    <div class="container">
      <!-- 视图切换栏 -->
      <div class="view-toolbar" id="viewToolbar">
        <div class="view-toolbar-left">
          <h2 class="view-title" id="viewTitle">全部文章</h2>
          <span class="view-count" id="viewCount"></span>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" id="viewGridBtn" title="网格视图" data-view="grid">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" id="viewListBtn" title="列表视图" data-view="list">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
      </div>
      <!-- 网格视图 -->
      <div class="article-grid" id="articleGrid"></div>
      <!-- 列表视图 -->
      <div class="article-list-view" id="articleListView" style="display:none;"></div>
      <div class="loading-more" id="loadingMore" style="display:none;">
        <div class="spinner"></div>
        <span>加载中...</span>
      </div>
      <div class="no-more" id="noMore" style="display:none;">
        <span>— 已加载全部文章 —</span>
      </div>
      <div class="load-more-btn-wrap" id="loadMoreBtnWrap">
        <button class="load-more-btn" id="loadMoreBtn">加载更多</button>
      </div>
    </div>
    </div>
  </main>

  <!-- 登录/注册弹窗 -->
  <div class="modal-overlay" id="authModal">
    <div class="auth-modal">
      <button class="modal-close" id="modalClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <!-- 登录表单 -->
      <div class="auth-form" id="loginForm">
        <div class="auth-header">
          <h2>欢迎回来</h2>
          <p>登录文轩，发现更多精彩</p>
        </div>
        <div class="form-item">
          <label>用户名 / 邮箱</label>
          <input type="text" id="loginUsername" placeholder="请输入用户名或邮箱" autocomplete="username">
        </div>
        <div class="form-item">
          <label>密码</label>
          <div class="password-wrap">
            <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
            <button class="toggle-pwd" type="button">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-error" id="loginError"></div>
        <button class="btn-submit" id="btnLogin">登 录</button>
        <div class="auth-switch">
          还没有账号？<a href="#" id="toRegister">立即注册</a>
        </div>
      </div>

      <!-- 注册表单 -->
      <div class="auth-form" id="registerForm" style="display:none;">
        <div class="auth-header">
          <h2>创建账号</h2>
          <p>加入文轩，开启阅读之旅</p>
        </div>
        <div class="form-item">
          <label>用户名</label>
          <input type="text" id="regUsername" placeholder="2-20位字母、数字、下划线" autocomplete="username">
        </div>
        <div class="form-item">
          <label>密码</label>
          <div class="password-wrap">
            <input type="password" id="regPassword" placeholder="至少6位，区分大小写" autocomplete="new-password">
            <button class="toggle-pwd" type="button">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-item">
          <label>确认密码</label>
          <div class="password-wrap">
            <input type="password" id="regPassword2" placeholder="再次输入密码" autocomplete="new-password">
          </div>
        </div>
        <div class="form-error" id="regError"></div>
        <button class="btn-submit" id="btnRegister">注 册</button>
        <div class="auth-switch">
          已有账号？<a href="#" id="toLogin">立即登录</a>
        </div>
      </div>
    </div>
  </div>

  <!-- 页脚 -->

          <span class="logo-icon">✦</span>
          <span>文轩</span>

        <div class="footer-links">
          <a href="#">关于我们</a>
          <a href="#">作者入驻</a>
          <a href="#">用户协议</a>
          <a href="#">隐私政策</a>
        </div>
        <p class="footer-copy">© 2026 文轩 WenXuan. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- Toast 提示 -->
