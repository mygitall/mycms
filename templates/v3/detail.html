<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>文章详情 · 文轩</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    // 禁止双指缩放页面（兼容 iOS、Android、鸿蒙等所有移动端浏览器）
    document.addEventListener('touchstart', function (e) {
      if (e.touches.length > 1) {
        e.preventDefault();
      }
    }, { passive: false });

    var lastTouchEnd = 0;
    document.addEventListener('touchend', function (e) {
      var now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('gesturestart', function (e) {
      e.preventDefault();
    });
    document.addEventListener('gesturechange', function (e) {
      e.preventDefault();
    });
    document.addEventListener('gestureend', function (e) {
      e.preventDefault();
    });

    document.addEventListener('keydown', function (e) {
      if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '0')) {
        e.preventDefault();
      }
    });

    document.addEventListener('wheel', function (e) {
      if (e.ctrlKey) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>
</head>
<body>

  <!-- 顶部导航 -->
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">文轩</span>
      </a>
      <div class="header-actions">
        <button class="btn-icon" id="searchBtn" title="搜索">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <div class="user-area" id="userArea">
          <button class="btn-login" id="btnLoginHeader">登录</button>
          <div class="user-avatar" id="userAvatar" style="display:none;">
            <span id="avatarInitial"></span>
            <div class="user-dropdown" id="userDropdown">
              <a href="user.html" class="dropdown-item" id="toUserCenter">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                个人中心
              </a>
              <button class="dropdown-item" id="btnLogout">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                退出登录
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- 阅读进度条 -->
  <div class="reading-progress" id="readingProgress"></div>

  <!-- 文章主体 -->
  <main class="article-page">
    <div class="article-container">
      <!-- 返回按钮 -->
      <div class="article-back">
        <a href="index.html" class="back-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          返回文章列表
        </a>
      </div>

      <!-- 文章头部 -->
      <div class="article-header" id="articleHeader"></div>

      <!-- 目录导航（正文上方） -->
      <div class="article-toc" id="articleToc">
        <div class="toc-header">
          <div class="toc-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            目录
          </div>
          <span class="toc-toggle" id="tocToggle">收起</span>
        </div>
        <ul class="toc-list" id="tocList"></ul>
      </div>

      <!-- 右侧悬浮目录（桌面端） -->
      <div class="toc-sidebar" id="tocSidebar">
        <div class="toc-sidebar-title">目录</div>
        <ul class="toc-list" id="tocSidebarList"></ul>
      </div>

      <!-- 文章正文 -->
      <article class="article-body" id="articleBody"></article>

      <!-- 文章底部互动区：点赞 + 评论数 + 分享 -->
      <div class="article-interactions" id="articleInteractions">
        <button class="btn-like" id="btnLike">
          <svg width="18" height="18" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <span id="likeCount">0</span>
          <span>点赞</span>
        </button>
        <div class="interaction-divider"></div>
        <button class="btn-comment-count" id="btnCommentCount">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span id="commentCount">0</span>
          <span>评论</span>
        </button>
      </div>

      <!-- 评论区域 -->
      <div class="comments-section" id="commentsSection">
        <h3 class="comments-title">
          评论区 <span class="count" id="commentsCountText"></span>
        </h3>
        <!-- 发布评论 -->
        <div class="comment-form" id="commentForm">
          <div class="comment-input-wrap">
            <div class="comment-avatar" id="commentAvatar">U</div>
            <textarea class="comment-input" id="commentInput" placeholder="写下你的想法..." rows="3"></textarea>
          </div>
          <button class="comment-submit" id="btnCommentSubmit">发表评论</button>
        </div>
        <!-- 评论列表 -->
        <div class="comment-list" id="commentList">
          <div class="comment-loading" id="commentLoading">加载评论中...</div>
        </div>
      </div>

      <!-- 作者信息卡 -->
      <div class="author-card" id="authorCard"></div>

      <!-- 上下篇导航 -->
      <div class="article-nav" id="articleNav">
        <div class="article-nav-prev" id="articleNavPrev"></div>
        <div class="article-nav-next" id="articleNavNext"></div>
      </div>

      <!-- 相关推荐 -->
      <div class="related-articles" id="relatedArticles">
        <h3 class="related-title">相关推荐</h3>
        <div class="related-grid" id="relatedGrid"></div>
      </div>
    </div>
  </main>

  <!-- 右侧悬浮工具栏 -->
  <div class="article-sidebar" id="articleSidebar">
    <button class="sidebar-btn" id="btnFav" title="收藏">
      <svg class="icon-fav" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
    <div class="sidebar-tips" id="favTips">收藏</div>
    <div class="sidebar-divider"></div>
    <button class="sidebar-btn" id="btnShare" title="分享">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </button>
    <div class="sidebar-tips">分享</div>
    <div class="sidebar-divider"></div>
    <button class="sidebar-btn back-top" id="btnBackTop" title="回到顶部" style="display:none;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="16 12 12 8 8 12"/><line x1="12" y1="16" x2="12" y2="8"/></svg>
    </button>
    <div class="sidebar-tips" id="backTopTips">顶部</div>
  </div>

  <!-- 分享弹窗 -->
  <div class="share-modal" id="shareModal">
    <div class="share-panel">
      <h3>分享到</h3>
      <div class="share-icons">
        <button class="share-icon-btn" id="shareWechat">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="#07C160"><path d="M8.5 12.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zM15.5 12.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zM12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2.586 20l3.347-1.352A9.96 9.96 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
          微信
        </button>
        <button class="share-icon-btn" id="shareWeibo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="#E6162D"><path d="M20.194 14.197c0 4.306-5.144 7.803-11.487 7.803-6.344 0-11.488-3.497-11.488-7.803 0-4.306 5.144-7.803 11.488-7.803.79 0 1.559.057 2.302.166a8.07 8.07 0 0 1 1.28.306 6.63 6.63 0 0 0 4.072-.03c1.795.67 3.033 2.13 3.333 3.991zm.09-3.316c-.333-1.597-1.48-2.833-2.93-3.52-.39-.184-.798-.314-1.216-.388a5.08 5.08 0 0 0-.67-.096 10.95 10.95 0 0 0-1.26.01 4.98 4.98 0 0 0-.8.123 4.03 4.03 0 0 0-.68.21 3.17 3.17 0 0 0-.54.283 2.2 2.2 0 0 0-.38.3c-.102.1-.18.204-.234.308a.78.78 0 0 0-.052.168.45.45 0 0 0-.01.12.24.24 0 0 0 .006.08.35.35 0 0 0 .038.09c.026.047.063.098.11.152.093.106.21.22.352.338.282.234.643.467 1.078.698a7.4 7.4 0 0 0 1.4.612c.27.083.548.15.832.201.142.025.286.047.43.065.072.009.145.015.218.02a5.6 5.6 0 0 0 .41.012 6.1 6.1 0 0 0 .37-.01c.06-.005.12-.012.18-.02a8.6 8.6 0 0 0 .36-.06c.058-.011.116-.024.173-.038.116-.027.23-.058.342-.092a6.3 6.3 0 0 0 .63-.24 5.7 5.7 0 0 0 .59-.318 5.8 5.8 0 0 0 1.08-.893 5.4 5.4 0 0 0 .73-.997 4.9 4.9 0 0 0 .38-.993 4.5 4.5 0 0 0 .12-.8z"/></svg>
          微博
        </button>
        <button class="share-icon-btn" id="shareCopy">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          复制链接
        </button>
      </div>
      <button class="share-close" id="shareClose">关闭</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"><span id="toastMsg"></span></div>

  <!-- 登录弹窗（与 index 共用） -->
  <div class="modal-overlay" id="authModal">
    <div class="auth-modal">
      <button class="modal-close" id="modalClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="auth-form" id="loginForm">
        <div class="auth-header">
          <h2>欢迎回来</h2>
          <p>登录文轩，发现更多精彩</p>
        </div>
        <div class="form-item">
          <label>用户名 / 邮箱</label>
          <input type="text" id="loginUsername" placeholder="请输入用户名或邮箱" autocomplete="username">
        </div>
        <div class="form-item">
          <label>密码</label>
          <div class="password-wrap">
            <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
            <button class="toggle-pwd" type="button">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-error" id="loginError"></div>
        <button class="btn-submit" id="btnLogin">登 录</button>
        <div class="auth-switch">还没有账号？<a href="#" id="toRegister">立即注册</a></div>
      </div>
      <div class="auth-form" id="registerForm" style="display:none;">
        <div class="auth-header">
          <h2>创建账号</h2>
          <p>加入文轩，开启阅读之旅</p>
        </div>
        <div class="form-item">
          <label>用户名</label>
          <input type="text" id="regUsername" placeholder="2-20位字母、数字、下划线" autocomplete="username">
        </div>
        <div class="form-item">
          <label>密码</label>
          <div class="password-wrap">
            <input type="password" id="regPassword" placeholder="至少6位，区分大小写" autocomplete="new-password">
            <button class="toggle-pwd" type="button">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-item">
          <label>确认密码</label>
          <div class="password-wrap">
            <input type="password" id="regPassword2" placeholder="再次输入密码" autocomplete="new-password">
          </div>
        </div>
        <div class="form-error" id="regError"></div>
        <button class="btn-submit" id="btnRegister">注 册</button>
        <div class="auth-switch">已有账号？<a href="#" id="toLogin">立即登录</a></div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
